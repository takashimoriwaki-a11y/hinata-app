// ===== TOAST =====
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = "info") => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
  }, []);
  return { toasts, success: m => add(m, "success"), error: m => add(m, "error"), info: m => add(m, "info") };
}
function Toasts({ toasts }) {
  return (
    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-2 w-[92vw] max-w-sm pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`px-4 py-3 rounded-xl text-sm font-semibold shadow-xl border pointer-events-auto ${t.type === "success" ? "bg-emerald-100 border-emerald-500 text-emerald-800" : t.type === "error" ? "bg-red-100 border-red-400 text-red-800" : "bg-white border-slate-300 text-slate-800"}`}>{t.msg}</div>
      ))}
    </div>
  );
}

// 2-value toggle (e.g. 済/未, 有/無, 該当/非該当)

// Multi-option selector (for insurance type etc.)
function ChipSelect({ val, opts, onChange, multi = false, large = false }) {
  const toggle = v => {
    if (multi) {
      const arr = val || [];
      onChange(arr.includes(v) ? arr.filter(x => x !== v) : [...arr, v]);
    } else {
      onChange(val === v ? "" : v);
    }
  };
  const isActive = v => multi ? (val || []).includes(v) : val === v;
  return (
    <div className="flex flex-wrap gap-2">
      {opts.map(opt => (
        <button key={opt} onClick={() => toggle(opt)}
          className={`${large ? "flex-1 py-5 text-base min-h-[60px]" : "px-5 py-4 text-base min-h-[54px]"} rounded-xl font-bold border transition-all active:scale-95 ${isActive(opt) ? "bg-teal-600 border-teal-500 text-white" : "bg-white border-slate-300 text-slate-600"}`}>
          {opt}
        </button>
      ))}
    </div>
  );
}

// Inline voice button (small)
function VoiceInline({ onText }) {
  const [rec, setRec] = useState(false);
  const mrRef = useRef(); const timerRef = useRef(); const [sec, setSec] = useState(0);
  const stop = () => { if (mrRef.current && mrRef.current.state !== "inactive") mrRef.current && mrRef.current.stop(); clearInterval(timerRef.current); };
  const start = async () => {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(s);
      mrRef.current = mr;
      const chunks = [];
      mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mr.onstop = async () => {
        s.getTracks().forEach(t => t.stop());
        clearInterval(timerRef.current);
        const blob = new Blob(chunks, { type: mr.mimeType || 'audio/webm' });
        // Web Speech API フォールバック（テキスト変換）
        setRec(false); setSec(0);
        onText("（録音完了）");
      };
      mr.start(100); setRec(true); setSec(0);
      timerRef.current = setInterval(() => setSec(x => x + 1), 1000);
    } catch { alert("マイク許可が必要です"); }
  };
  return (
    <button type="button" onClick={rec ? stop : start}
      className={`flex-shrink-0 w-14 h-14 rounded-xl border flex flex-col items-center justify-center gap-0.5 text-xl transition-all active:scale-95 ${rec ? "bg-red-500 border-red-400 text-white animate-pulse" : "bg-slate-200 border-slate-300 text-slate-600"}`}>
      <span>{rec ? "⏹" : "🎤"}</span>
      {rec && <span className="text-[9px] font-bold">{sec}s</span>}
    </button>
  );
}

// Photo capture button

// Business card scan
function CardScanBtn({ onResult, toast }) {
  const ref = useRef();
  const [scanning, setScanning] = useState(false);
  const handle = e => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    setScanning(true);
    const r = new FileReader();
    r.onload = async ev => {
      try {
        const data = ev.target.result.split(",")[1];
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 500, messages: [{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: f.type, data } }, { type: "text", text: '名刺の画像から情報を読み取り、JSONのみ返してください。キー：{"name":"氏名","organization":"組織名","role":"役職・役割","phone":"電話番号","note":"その他情報"}' }] }] })
        });
        const d = await res.json();
        const txt = d.content && d.content.map(b => b.text || "").join("") || "";
        const parsed = JSON.parse(txt.replace(/```json|```/g, "").trim());
        onResult(parsed);
        toast.success("名刺を読み取りました");
      } catch { toast.error("名刺の読み取りに失敗しました"); }
      finally { setScanning(false); }
    };
    r.readAsDataURL(f);
  };
  return (
    <div>
      <button onClick={() => ref.current && ref.current.click()} disabled={scanning}
        className="flex flex-col items-center justify-center gap-1.5 px-6 py-4 bg-purple-100 border border-purple-300 rounded-xl text-purple-700 font-bold active:scale-95 disabled:opacity-50 min-h-[72px]">
        <span className="text-2xl leading-none">🪪</span>
        <span className="text-sm">{scanning ? "読み取り中…" : "名刺スキャン"}</span>
      </button>
      <input ref={ref} type="file" accept="image/*" capture="environment" className="hidden" onChange={handle} />
    </div>
  );
}

// ===== FACESHEET MODAL =====
function FSModal({ onClose, onExtracted, toast }) {
  const [files, setFiles] = useState([]); const [text, setText] = useState(""); const [loading, setLoading] = useState(false);
  const fileRef = useRef(); const camRef = useRef();
  const addFiles = e => Array.from(e.target.files || []).forEach(f => { const r = new FileReader(); r.onload = ev => setFiles(p => [...p, { name: f.name, mimeType: f.type, data: ev.target.result.split(",")[1], preview: ev.target.result }]); r.readAsDataURL(f); });
  const extract = async () => {
    if (!files.length && !text.trim()) { toast.error("写真またはテキストを入力してください"); return; }
    setLoading(true);
    try {
      const content = [];
      files.filter(f => f.mimeType && f.mimeType.startsWith("image/")).forEach(f => content.push({ type: "image", source: { type: "base64", media_type: f.mimeType, data: f.data } }));

【チェックボックス・選択欄の読み取りルール（最重要）】
- ✓、✔、レ点、○、●、■が付いている項目＝その内容が「該当・選択・実施あり」
- □（空のチェックボックス）、空欄＝非該当・なし
- チェックされた複数の項目は全て読み取り、自然な文章にまとめる
- 例：「□介護保険 ✓自立支援 □医療保険」→「自立支援医療を利用している」
- 例：「✓定期（週2回）□不定期」→「定期訪問（週2回）」
- 例：「✓有□無（薬の有無）」→「内服薬あり」

  return (

        <div className="grid grid-cols-2 gap-3">
          <button onClick={() => camRef.current && camRef.current.click()} className="flex flex-col items-center gap-3 py-10 rounded-2xl bg-amber-50 border-2 border-amber-400 text-amber-800 active:scale-[0.97]"><span className="text-5xl">📷</span><span className="text-base font-bold">カメラで撮影</span></button>
          <button onClick={() => fileRef.current && fileRef.current.click()} className="flex flex-col items-center gap-3 py-10 rounded-2xl bg-teal-50 border-2 border-teal-400 text-teal-800 active:scale-[0.97]"><span className="text-5xl">📁</span><span className="text-base font-bold">ファイル選択</span></button>
        </div>
        <input ref={camRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={addFiles} />
        <input ref={fileRef} type="file" accept="image/*,application/pdf" multiple className="hidden" onChange={addFiles} />
        {files.length > 0 && (
          <div className="flex flex-wrap gap-2">{files.map((f,i)=>(
            <div key={i} className="relative">
              {f.mimeType && f.mimeType.startsWith("image/") ? <img src={f.preview} className="w-20 h-20 rounded-xl object-cover border-2 border-teal-600/50" /> : <div className="w-20 h-20 rounded-xl bg-slate-200 border-2 border-slate-300 flex items-center justify-center text-2xl">📄</div>}
              <button onClick={() => setFiles(p => p.filter((_,j)=>j!==i))} className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 rounded-full text-white text-xs flex items-center justify-center font-bold">✕</button>
            </div>
          ))}</div>
        )}
        <TTextarea label="補足テキスト（任意）" value={text} onChange={setText} placeholder="フェイスシートの内容をテキストで貼り付けることも可能です" rows={4} voice />
      </div>
      <div className="px-4 py-4 border-t border-slate-200 bg-white flex-shrink-0">
        <button onClick={extract} disabled={loading || (!files.length && !text.trim())}
          className="w-full h-20 rounded-2xl bg-gradient-to-r from-teal-600 to-emerald-500 disabled:from-slate-300 disabled:to-slate-300 disabled:text-slate-600 text-white font-bold text-lg flex items-center justify-center gap-3 shadow-lg active:scale-[0.99]">
          {loading ? <><span className="animate-spin text-2xl">⏳</span><span>AI読み取り中…</span></> : <><span className="text-2xl">✨</span><span>AIで読み取り → 両方に反映</span></>}
        </button>
      </div>
    </div>
  );
}

  const hasFS = !!fs.extractedAt;
  const isKaigo = data.visitType === "介護保険";

  // 生活保護→医療保険証不要＋アプラス「生活保護」自動
  useEffect(() => {
    if (data.welfare === "該当") {
      setData(p => ({
        ...p,
        insuranceCard: p.insuranceCard !== "不要" ? "不要" : p.insuranceCard,
        aplus: p.aplus !== "済" ? "生活保護" : p.aplus,
      }));
    }
  }, [data.welfare]);

  // 医療機関1の入力 → 指示書の依頼先・主治医に自動反映
  const firstVisitHospital = data.nextVisits && data.nextVisits[0] ? data.nextVisits[0].hospital : "";
  const firstVisitDoctor = data.nextVisits && data.nextVisits[0] ? data.nextVisits[0].doctor : "";
  useEffect(() => {
    if (!firstVisitHospital && !firstVisitDoctor) return;
    setData(p => ({
      ...p,
      instructionDest: firstVisitHospital || p.instructionDest,
      instructionDoctor: firstVisitDoctor || p.instructionDoctor,
    }));
  }, [firstVisitHospital, firstVisitDoctor]);

  // 自立支援写真→追加自動

    setData(p => ({ ...p, selfSupportPhoto: photo, selfSupportMode: "追加", selfSupport: "有" }));
  };

  // 保険証系写真→有自動

    setData(p => ({ ...p, [photoKey]: photo, ...(photo ? { [statusKey]: "有" } : {}) }));
  };

  // 申請者連動

    setData(p => ({ ...p, ssApplicant: val, ssSubmitter: val === "その他" ? p.ssSubmitter : val, ssDocLocation: val === "その他" ? p.ssDocLocation : val }));
  };

    setData(p => ({ ...p, ssAddApplicant: val, ssAddSubmitter: val === "その他" ? p.ssAddSubmitter : val, ssAddDocLocation: val === "その他" ? p.ssAddDocLocation : val }));

      {/* 負担割合証 */}
      <Card className={data.burdenRatio === "有" ? "border-teal-300 bg-teal-50" : ""}>
        <span className="text-slate-700 font-semibold text-sm block mb-2">★ 負担割合証{data.burdenRatio === "未" && <span className="ml-2 text-[10px] font-bold text-red-700 bg-red-100 border border-red-400 px-1.5 py-0.5 rounded-full">必須</span>}{data.burdenRatio !== "未" && <span className="ml-2 text-[10px] font-bold text-emerald-700">✓</span>}</span>
        <Toggle2 val={data.burdenRatio} opts={[{ label: "有", value: "有" }, { label: "無", value: "無" }]} onChange={v => set("burdenRatio", v)} large />
        <PhotoBtn photo={data.burdenRatioPhoto} onPhoto={handleInsPhoto("burdenRatioPhoto","burdenRatio")} />
      </Card>

      {/* 自立支援医療受給者証 */}
      <Card className={data.selfSupport === "有" ? "border-teal-300 bg-teal-50" : ""}>
        <span className="text-slate-700 font-semibold text-sm block mb-2">★ 自立支援医療受給者証{data.selfSupport === "未" && <span className="ml-2 text-[10px] font-bold text-red-700 bg-red-100 border border-red-400 px-1.5 py-0.5 rounded-full">必須</span>}{data.selfSupport !== "未" && <span className="ml-2 text-[10px] font-bold text-emerald-700">✓</span>}</span>
        <Toggle2 val={data.selfSupport} opts={[{ label: "有", value: "有" }, { label: "無", value: "無" }]} onChange={v => set("selfSupport", v)} large />
        <PhotoBtn photo={data.selfSupportPhoto} onPhoto={handleSelfSupportPhoto} />
        {data.selfSupport === "有" && (
          <div className="mt-3">
            <Toggle2 val={data.selfSupportMode}
              opts={[{ label: "新規", value: "新規" }, { label: "追加", value: "追加" }]} large
              onChange={v => set("selfSupportMode", v)} />

            {data.selfSupportMode === "新規" && (
              <div className="mt-3 space-y-3 border-t border-slate-700 pt-3">
                {/* 申請予定者 */}
                <div>
                  <label className="text-xs text-slate-500 block mb-1">申請予定者</label>
                  <ChipSelect val={data.ssApplicant} opts={APPLICANTS} onChange={handleApplicantChange} />
                  {data.ssApplicant === "その他" && <div className="mt-2"><TInput value={data.ssDocLocationOther} onChange={v => set("ssDocLocationOther", v)} placeholder="詳細を入力…" voice /></div>}
                </div>
                {/* 役場提出予定 */}
                <div>
                  <label className="text-xs text-slate-500 block mb-1">役場提出予定</label>
                  <TInput type="date" value={data.ssSubmitDate} onChange={v => set("ssSubmitDate", v)} className="mb-2" />
                  <ChipSelect val={data.ssSubmitter} opts={APPLICANTS} onChange={v => set("ssSubmitter", v)} />
                  {data.ssSubmitter === "その他" && <div className="mt-2"><TInput value={data.ssSubmitterOther} onChange={v => set("ssSubmitterOther", v)} placeholder="詳細を入力…" voice /></div>}
                </div>
                {/* 申請書類の所在 */}
                <div>
                  <label className="text-xs text-slate-500 block mb-1">申請書類の所在</label>
                  <ChipSelect val={data.ssDocLocation} opts={APPLICANTS} onChange={v => set("ssDocLocation", v)} />
                  {data.ssDocLocation === "その他" && <div className="mt-2"><TInput value={data.ssDocLocationOther} onChange={v => set("ssDocLocationOther", v)} placeholder="詳細を入力…" voice /></div>}
                </div>
                <div>
                  <label className="text-xs text-slate-500 block mb-1">診断書代の説明</label>
                  <Toggle2 val={data.ssDiagExplain} opts={[{ label: "済", value: "済" }, { label: "未", value: "未" }]} onChange={v => set("ssDiagExplain", v)} />
                </div>
                <div>
                  <label className="text-xs text-slate-500 block mb-1">診断書依頼</label>
                  <TInput type="date" value={data.ssDiagRequest} onChange={v => set("ssDiagRequest", v)} className="mb-2" />
                  <ChipSelect val={data.ssDiagRequestStatus} opts={["済","予定","未確定"]} onChange={v => set("ssDiagRequestStatus", v)} />
                </div>
                <div>
                  <label className="text-xs text-slate-500 block mb-1">薬局と病院確認</label>
                  <Toggle2 val={data.ssPharmacyCheck} opts={[{ label: "済", value: "済" }, { label: "未", value: "未" }]} onChange={v => set("ssPharmacyCheck", v)} />
                </div>
                <TTextarea label="その他" value={data.ssNote} onChange={v => set("ssNote", v)} placeholder="自由記述…" voice />
              </div>
            )}

            {data.selfSupportMode === "追加" && (
              <div className="mt-3 space-y-3 border-t border-slate-700 pt-3">
                <div>
                  <label className="text-xs text-slate-500 block mb-1">申請予定者</label>
                  <ChipSelect val={data.ssAddApplicant} opts={APPLICANTS} onChange={handleAddApplicantChange} />
                  {data.ssAddApplicant === "その他" && <div className="mt-2"><TInput value={data.ssAddDocLocationOther} onChange={v => set("ssAddDocLocationOther", v)} placeholder="詳細を入力…" voice /></div>}
                </div>
                <div>
                  <label className="text-xs text-slate-500 block mb-1">役場提出予定</label>
                  <TInput type="date" value={data.ssAddSubmitDate} onChange={v => set("ssAddSubmitDate", v)} className="mb-2" />
                  <ChipSelect val={data.ssAddSubmitter} opts={APPLICANTS} onChange={v => set("ssAddSubmitter", v)} />
                  {data.ssAddSubmitter === "その他" && <div className="mt-2"><TInput value={data.ssAddSubmitterOther} onChange={v => set("ssAddSubmitterOther", v)} placeholder="詳細を入力…" voice /></div>}
                </div>
                <div>
                  <label className="text-xs text-slate-500 block mb-1">申請書類の所在</label>
                  <ChipSelect val={data.ssAddDocLocation} opts={APPLICANTS} onChange={v => set("ssAddDocLocation", v)} />
                  {data.ssAddDocLocation === "その他" && <div className="mt-2"><TInput value={data.ssAddDocLocationOther} onChange={v => set("ssAddDocLocationOther", v)} placeholder="詳細を入力…" voice /></div>}
                </div>
                <TTextarea label="その他" value={data.ssAddNote} onChange={v => set("ssAddNote", v)} placeholder="自由記述…" voice />
              </div>
            )}
          </div>
        )}
      </Card>

      {/* 限度額認定証 */}
      <Card className={data.limitAmount === "有" ? "border-teal-300 bg-teal-50" : ""}>
        <span className="text-slate-700 font-semibold text-sm block mb-2">★ 限度額認定証{data.limitAmount === "未" && <span className="ml-2 text-[10px] font-bold text-red-700 bg-red-100 border border-red-400 px-1.5 py-0.5 rounded-full">必須</span>}{data.limitAmount !== "未" && <span className="ml-2 text-[10px] font-bold text-emerald-700">✓</span>}</span>
        <Toggle2 val={data.limitAmount} opts={[{ label: "有", value: "有" }, { label: "無", value: "無" }]} onChange={v => set("limitAmount", v)} large />
        <PhotoBtn photo={data.limitAmountPhoto} onPhoto={handleInsPhoto("limitAmountPhoto","limitAmount")} />
      </Card>

      {/* 手帳（複数対応） */}
      <Card>
        <div className="flex items-center justify-between mb-3">
          <span className="text-slate-700 font-semibold text-sm">★ 精神・身体・療育手帳</span>
          {hasFS && fs.hasHandicapBook && <span className="text-xs text-teal-700 bg-teal-50 border border-teal-300 px-2 py-0.5 rounded-full">FS：手帳あり</span>}
        </div>
        {data.handbooks.map((hb, hi) => (
          <div key={hi} className={`mb-3 p-3 rounded-xl border ${hb.status === "有" ? "border-teal-300 bg-teal-50/80" : "border-slate-200 bg-white"}`}>
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs text-slate-700 font-semibold">手帳 {hi + 1}</span>
              {hi > 0 && (
                <button onClick={() => setData(p => ({ ...p, handbooks: p.handbooks.filter((_,j) => j !== hi) }))}
                  className="text-xs text-red-600 border border-red-300 px-2 py-1 rounded-lg active:scale-95">削除</button>
              )}
            </div>
            <Toggle2 val={hb.status}
              opts={[{ label: "有", value: "有" }, { label: "無", value: "無" }]}
              onChange={v => setData(p => ({ ...p, handbooks: p.handbooks.map((x,j) => j===hi ? {...x, status:v} : x) }))} />
            <PhotoBtn photo={hb.photo}
              onPhoto={photo => setData(p => ({ ...p, handbooks: p.handbooks.map((x,j) => j===hi ? {...x, photo, status:"有"} : x) }))} />
          </div>
        ))}
        <button onClick={() => setData(p => ({ ...p, handbooks: [...p.handbooks, { status: "未", photo: null }] }))}
          className="w-full py-2 rounded-xl border border-dashed border-teal-600/60 text-teal-700 text-sm font-bold active:scale-[0.99]">
          ＋ 手帳を追加
        </button>
      </Card>

      {/* アプラス */}
      <Card>
        <CardLabel required done={data.aplus === "済" || data.aplus === "生活保護"}>アプラス用紙</CardLabel>
        <div className="flex gap-2">
          {[
            { label: "済", value: "済" },
            { label: "生活保護", value: "生活保護", color: "bg-orange-600 border-orange-500 text-white" },
            { label: "未", value: "未" },
          ].map(opt => (
            <button key={opt.value} onClick={() => set("aplus", opt.value)}
              className={`flex-1 py-5 rounded-xl text-base font-bold border transition-all active:scale-95 min-h-[60px] ${data.aplus === opt.value ? "bg-teal-600 border-teal-500 text-white" : "bg-white border-slate-300 text-slate-600"}`}>
              {opt.label}
            </button>
          ))}
        </div>
        <div className="mt-2"><TTextarea value={data.aplusNote} onChange={v => set("aplusNote", v)} placeholder="備考（任意）…" voice /></div>
      </Card>

      {/* 各病院の次回受診日 */}
      <Card>
        <CardLabel>各病院の次回受診日</CardLabel>
        <div className="space-y-3">
          {data.nextVisits.map((nv, i) => (
            <div key={i} className="p-3 bg-slate-50 border border-slate-200 rounded-xl space-y-2">
              <div className="flex items-center justify-between">
                <span className="text-xs text-slate-700 font-semibold">医療機関 {i + 1}</span>
                {i > 0 && <button onClick={() => setData(p => ({ ...p, nextVisits: p.nextVisits.filter((_,j)=>j!==i) }))}
                  className="text-xs text-red-600 border border-red-300 px-2 py-0.5 rounded-lg active:scale-95">削除</button>}
              </div>
              <TInput value={nv.hospital} onChange={v => setData(p => ({ ...p, nextVisits: p.nextVisits.map((x,j) => j===i ? {...x,hospital:v} : x) }))} placeholder="医療機関名" voice />
              <TInput value={nv.doctor} onChange={v => setData(p => ({ ...p, nextVisits: p.nextVisits.map((x,j) => j===i ? {...x,doctor:v} : x) }))} placeholder="主治医名" label="主治医" voice />
              {i === 0 && (nv.hospital || nv.doctor) && (
                <div className="flex items-center gap-1.5 mt-1 px-2 py-1.5 bg-teal-50 border border-teal-200 rounded-lg">
                  <span className="text-[10px] text-teal-700 font-bold">↓ 自動反映中</span>
                  <span className="text-[10px] text-teal-600">指示書の依頼先・主治医 ／ 緊急連絡先の主治医</span>
                </div>
              )}
              <div>
                <div className="flex items-center justify-between mb-1">
                  <label className="text-xs text-slate-500">次回受診日</label>
                  <button
                    onClick={() => setData(p => ({ ...p, nextVisits: p.nextVisits.map((x,j) => j===i ? {...x, undecided: !x.undecided, date: !x.undecided ? "" : x.date} : x) }))}
                    className={`text-xs font-bold px-3 py-1 rounded-lg border transition-all active:scale-95 ${nv.undecided ? "bg-slate-600 border-slate-500 text-white" : "bg-white border-slate-300 text-slate-600"}`}>
                    未定
                  </button>
                </div>
                {nv.undecided ? (
                  <div className="w-full bg-slate-100 border border-slate-300 rounded-xl px-3 py-3 text-slate-500 text-sm text-center">未定</div>
                ) : (
                  <input type="date" value={nv.date} onChange={e => setData(p => ({ ...p, nextVisits: p.nextVisits.map((x,j) => j===i ? {...x,date:e.target.value} : x) }))}
                    className="w-full bg-white border border-slate-300 rounded-xl px-3 py-3 text-slate-800 text-sm focus:outline-none focus:border-teal-500" />
                )}
              </div>
            </div>
          ))}
        </div>
        <button onClick={() => setData(p => ({ ...p, nextVisits: [...p.nextVisits, { hospital: "", doctor: "", date: "", undecided: false }] }))}
          className="mt-3 w-full py-4 rounded-xl border border-dashed border-teal-600 text-teal-700 text-base font-bold active:scale-[0.99]">＋ 医療機関を追加</button>
      </Card>

      {/* 処方内容 */}
      <Card className={data.prescription === "済" ? "border-emerald-400/50 bg-emerald-50" : data.prescription === "処方なし" ? "border-slate-200 bg-slate-50" : ""}>
        <CardLabel required done={data.prescription === "済" || data.prescription === "処方なし"}>処方内容</CardLabel>
        <div className="flex gap-2 mb-3">
          {[{ label: "済", value: "済" }, { label: "処方なし", value: "処方なし", color: "bg-slate-600 border-slate-500 text-white" }, { label: "未", value: "未" }].map(opt => (
            <button key={opt.value} onClick={() => set("prescription", opt.value)}
              className={`flex-1 py-4 rounded-xl text-base font-bold border transition-all active:scale-95 min-h-[54px] ${data.prescription === opt.value ? "bg-teal-600 border-teal-500 text-white" : "bg-white border-slate-300 text-slate-600"}`}>
              {opt.label}
            </button>
          ))}
        </div>
        {data.prescription !== "処方なし" && (
          <>
            <PhotoBtn photo={data.prescriptionPhoto}
              onPhoto={p => { setData(d => ({ ...d, prescriptionPhoto: p, prescription: "済" })); if (onPrescriptionPhoto) onPrescriptionPhoto(p); }}
              label="処方内容を撮影" />
            {data.prescriptionPhoto && (
              <p className="text-xs text-teal-700 mt-1.5">✦ 記録書Ⅰにも反映されます</p>
            )}
          </>
        )}
      </Card>

      {/* 訪問看護指示書の依頼 */}
      <Card>
<div className="flex items-center gap-2 mb-1">
          <span className="text-slate-700 font-semibold text-sm">訪問看護指示書の依頼</span>
          {data.instruction !== "済"
            ? <span className="text-[10px] font-bold text-red-700 bg-red-100 border border-red-400 px-1.5 py-0.5 rounded-full">必須</span>
            : <span className="text-[10px] font-bold text-teal-700">✓</span>}
        </div>
        {data.nextVisits && data.nextVisits[0] && data.nextVisits[0].hospital && (
          <div className="flex items-center gap-1 mb-3 px-2 py-1 bg-teal-50 border border-teal-200 rounded-lg">
            <span className="text-[10px] text-teal-600">↑ 医療機関1（{data.nextVisits[0].hospital}）から自動反映</span>
          </div>
        )}
        <Toggle2 val={data.instruction} opts={[{ label: "済", value: "済" }, { label: "未", value: "未" }]} onChange={v => set("instruction", v)} large />
        <div className="mt-3">
        </div>
        <div className="space-y-2 mt-2">
          <TInput label="依頼先" value={data.instructionDest} required onChange={v => set("instructionDest", v)} placeholder="例：○○クリニック" voice badge={hasFS && !!fs.doctorHospital} />
          <TInput label="主治医" value={data.instructionDoctor} required onChange={v => set("instructionDoctor", v)} placeholder="例：田中 医師" voice badge={hasFS && !!fs.doctorName} />
          <TInput label="依頼日" type="date" value={data.instructionDate} required onChange={v => set("instructionDate", v)} />
          <TInput label="指示書開始日" type="date" value={data.instructionStart} required onChange={v => set("instructionStart", v)} />
          <TTextarea label="依頼理由" value={data.instructionReason} required onChange={v => set("instructionReason", v)} placeholder="理由を入力…" rows={2} voice />
        </div>
      </Card>

      {/* 正式な名前の書体 */}
      <Card>
        <CardLabel required done={data.namestyle !== ""}>正式な名前の書体</CardLabel>
        <Toggle2 val={data.namestyle} opts={[{ label: "必要", value: "必要" }, { label: "不必要", value: "不必要" }]} onChange={v => set("namestyle", v)} />
        {data.namestyle === "必要" && (
          <div className="mt-3 space-y-2">
            <label className="text-xs text-slate-500 block">難しい漢字を手書き入力（タッチして書いてください）</label>
            <KanjiCanvas value={data.namestyleKanji} onChange={v => set("namestyleKanji", v)} />
            <TInput value={data.namestyleKanji} onChange={v => set("namestyleKanji", v)} placeholder="または、テキストで入力…" />
          </div>
        )}
      </Card>

      {/* 注意事項確認 */}
      <Divider>注意事項確認</Divider>
      <div className="space-y-2">
        {[
          { key: "cautionVisitTime", label: "訪問時間は前後することを説明" },
          { key: "cautionTeam", label: "チーム制になっているので指名に応えられないことを説明" },
          { key: "cautionStayTime", label: "滞在時間について説明" },
          { key: "cautionHoliday", label: "祝日と訪問日が重なればその週で振替えて別日に訪問することを説明" },
          ...(isKaigo ? [
            { key: "cautionCareInsNurse", label: "介護保険で看護師以外が訪問する際ケアマネに説明" },
            { key: "cautionCareInsReport", label: "実際の訪問時間は実績で報告とケアマネに説明" },
          ] : []),
        ].map(({ key, label }) => (
          <button key={key} onClick={() => setData(p => ({ ...p, [key]: !p[key] }))}
            className={`w-full flex items-start gap-3 p-4 rounded-2xl border text-left transition-all active:scale-[0.99] ${data[key] ? "bg-teal-100 border-teal-500" : "bg-white border-slate-300"}`}>
            <div className={`w-6 h-6 rounded-lg flex-shrink-0 flex items-center justify-center border-2 mt-0.5 ${data[key] ? "bg-emerald-500 border-emerald-500" : "border-slate-300 bg-white"}`}>
              {data[key] && <span className="text-white text-xs font-bold">✓</span>}
            </div>
            <span className="text-slate-700 text-sm leading-relaxed">{label}</span>
          </button>
        ))}
      </div>

      {/* 申し送り事項 */}
      <Divider>申し送り事項</Divider>
      <Card>
        <TTextarea value={data.handover} onChange={v => set("handover", v)} placeholder="申し送り事項を入力…" rows={4} voice />
      </Card>

      {/* 書類写真をDriveに送信 */}
      <DriveUploadBtn data={data} toast={toast} />
    </div>
  );
}

// ===== Google Drive 書類写真アップロードボタン =====
function App(){return <div>ContractTab OK</div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
