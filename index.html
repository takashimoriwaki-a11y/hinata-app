  // APP_SECRETはlocalStorageに保存（初回アクセス時に管理者が設定）
  // Railway環境変数のAPP_SECRETと一致させる
  return localStorage.getItem('hinata_app_secret') || '';
})();

async function _apiPost(path, body) {
  const bodyStr = JSON.stringify(body);
  // HMAC-SHA256署名（Web Crypto API）
  let signature = '';
  if (_APP_SECRET) {
    const key = await crypto.subtle.importKey(
      'raw',
      new TextEncoder().encode(_APP_SECRET),
      { name: 'HMAC', hash: 'SHA-256' },
      false,
      ['sign']
    );
    const sig = await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(bodyStr));
    signature = Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  const res = await fetch(_API_BASE + path, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(signature ? { 'X-Request-Signature': signature } : {}),
    },
    body: bodyStr,
  });
  return res;
}

function resizeImage(file, maxPx, quality) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality || 0.75));
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

// ===== KANJI CANVAS =====
function KanjiCanvas({ value, onChange }) {
  const canvasRef = useRef();
  const drawing = useRef(false);
  const lastPos = useRef(null);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - rect.left) * (canvas.width / rect.width), y: (src.clientY - rect.top) * (canvas.height / rect.height) };
  };

  const start = e => { e.preventDefault(); drawing.current = true; const pos = getPos(e, canvasRef.current); lastPos.current = pos; };
  const move = e => {
    e.preventDefault();
    if (!drawing.current) return;
    const canvas = canvasRef.current; const ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = "#94d3c3"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.stroke();
    lastPos.current = pos;
  };
  const end = () => { drawing.current = false; };
  const clear = () => { const canvas = canvasRef.current; canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height); };

  return (
    React.createElement('div', { className: "space-y-2",}
      , React.createElement('canvas', { ref: canvasRef, width: 600, height: 300,
        className: "w-full h-56 bg-stone-300 border border-stone-400 rounded-xl cursor-crosshair touch-none"       ,
        style: {WebkitUserSelect:'none',userSelect:'none',WebkitTouchCallout:'none'},
        onContextMenu: e => e.preventDefault(),
        onMouseDown: start, onMouseMove: move, onMouseUp: end, onMouseLeave: end,
        onTouchStart: start, onTouchMove: move, onTouchEnd: end, onTouchCancel: end,} )
      , React.createElement('button', { onClick: clear, className: "text-xs text-stone-700 border border-stone-400 px-3 py-1.5 rounded-lg active:scale-95"       ,}, "クリア")
    )
  );
}

    if (!sharedPrescriptionPhoto) return;

    try {
      // 複数写真がある場合は全て送信（最初の1枚だけ使用）
      const base64 = sharedPrescriptionPhoto.split(",")[1];
      const mimeType = sharedPrescriptionPhoto.split(";")[0].split(":")[1] || "image/jpeg";
      const res = await _apiPost("/api/ocr-prescription", { base64Image: base64, mimeType: mimeType });

      if (!ocrResult.success) throw new Error(ocrResult.error || "読み取り失敗");
      const text = ocrResult.text;
      if (text) {
        setFields(prev => ({
          ...prev,
          currentCondition: (prev.currentCondition
            ? prev.currentCondition + "\n\n【処方内容】\n" + text
            : "【処方内容】\n" + text).slice(0, 440)
        }));
        setPrescriptionRead(true);
        setHasExtracted(true);
        toast.success("処方内容を読み取りました。「現在の病状・治療内容」欄を確認してください。");

        toast.error("読み取りに失敗しました。");

// 進捗状態を返す：{ done, total, hasUndone }
// done: 済の数, total: 全体, hasUndone: 未が1つ以上あるか
function calcContractProgress(d) {
  const bi = d.basicInfo || {};
  const isKaigo = d.visitType === "介護保険";
  const items = [
    !!bi.userName, !!bi.birthDate, !!bi.postalCode, !!bi.address, !!bi.contractDate,
    d.visitType !== "", d.welfare !== "", d.visitPlace !== "",
    d.team !== "",
    d.importantDoc === "済", d.transport !== "",
    d.insuranceCard !== "未", d.careInsurance !== "未",
    d.burdenRatio !== "未", d.selfSupport !== "未", d.limitAmount !== "未",
    d.handbooks && d.handbooks.some(h => h.status !== "未"),
    d.aplus === "済" || d.aplus === "生活保護",
    d.prescription === "済" || d.prescription === "処方なし",
    d.instruction === "済", !!d.instructionDest, !!d.instructionDoctor,
    !!d.instructionStart,
    d.namestyle !== "",
    d.cautionVisitTime, d.cautionTeam, d.cautionStayTime, d.cautionHoliday,
    ...(isKaigo ? [d.cautionCareInsNurse, d.cautionCareInsReport] : []),
  ];
  const done = items.filter(Boolean).length;
  const total = items.length;
  const hasUndone = [
    !bi.userName, !bi.birthDate, !bi.postalCode, !bi.address, !bi.contractDate,
    d.visitType === "", d.welfare === "", d.visitPlace === "", d.team === "",
    d.importantDoc === "未", d.transport === "",
    d.insuranceCard === "未", d.careInsurance === "未",
    d.burdenRatio === "未", d.selfSupport === "未", d.limitAmount === "未",
    d.handbooks && d.handbooks.every(h => h.status === "未"),
    d.aplus === "未",
    d.prescription === "未",
    d.instruction === "未", !d.instructionDest, !d.instructionDoctor,
    !d.instructionStart,
    d.namestyle === "",
    !d.cautionVisitTime, !d.cautionTeam, !d.cautionStayTime, !d.cautionHoliday,
  ].some(Boolean);
  return { done, total, hasUndone };
}

// 必須項目の名前付きリスト（一覧画面での未完了表示用）
function calcContractTodos(d) {
  const bi = d.basicInfo || {};
  const todos = [];
  if (!bi.userName)          todos.push('利用者氏名');
  if (!bi.birthDate)         todos.push('生年月日');
  if (!bi.postalCode)        todos.push('郵便番号');
  if (!bi.address)           todos.push('住所');
  if (!bi.contractDate)      todos.push('契約日');
  if (d.visitType === '')    todos.push('保険種別');
  if (d.welfare === '')      todos.push('生活保護');
  if (d.visitPlace === '')   todos.push('訪問先');
  if (d.team === '')         todos.push('担当チーム');
  if (d.importantDoc !== '済')  todos.push('重要事項説明書');
  if (d.transport === '')    todos.push('交通費');
  if (d.insuranceCard === '未') todos.push('医療保険証');
  if (d.careInsurance === '未') todos.push('介護保険証');
  if (d.burdenRatio === '未')   todos.push('負担割合証');
  if (d.selfSupport === '未')   todos.push('自立支援');
  if (d.limitAmount === '未')   todos.push('限度額認定証');
  if (d.handbooks && d.handbooks.every(h => h.status === '未')) todos.push('手帳');
  if (d.aplus === '未')      todos.push('アプラス用紙');
  if (d.prescription === '未') todos.push('処方内容');
  if (d.instruction === '未')  todos.push('指示書');
  if (!d.instructionDest)    todos.push('指示書依頼先');
  if (!d.instructionDoctor)  todos.push('指示書主治医');
  if (!d.instructionStart)   todos.push('指示書開始日');
  if (d.namestyle === '')    todos.push('書体確認');
  return todos;
}

function calcEmergencyProgress(d) {
  const items = [];
  // 家族
  if (d.familyMode === "有") {
    d.family.forEach(f => { items.push(!!f.name); items.push(!!f.phone); });
  }
  // 主治医
  items.push(!!d.doctor.hospital);
  // 支援者
  d.supporters.forEach(s => { if (s.name || s.role) items.push(!!s.name); });
  const done = items.filter(Boolean).length;
  const total = Math.max(items.length, 1);
  const hasUndone = items.some(v => !v);
  return { done, total, hasUndone };
}

function calcTaskProgress(d) {
  const vals = Object.values(d.tasks);
  const done = vals.filter(v => v === "済").length;
  const total = vals.length;
  const hasUndone = vals.some(v => v === "未");
  return { done, total, hasUndone };
}

// タブバッジコンポーネント
function TabBadge({ done, total, hasUndone }) {
  if (done === 0 && total > 0) {
    // 何も済んでいない
    return React.createElement('span', { className: "absolute top-1.5 right-2 w-2.5 h-2.5 rounded-full bg-red-500 border border-stone-900"        ,} );
  }
  if (hasUndone) {
    // 一部未完了
    return React.createElement('span', { className: "absolute top-1.5 right-2 w-2.5 h-2.5 rounded-full bg-amber-400 border border-stone-900"        ,} );
  }
  if (done === total && total > 0) {
    // 全て済
    return React.createElement('span', { className: "absolute top-1.5 right-2 text-[10px] leading-none"    ,}, "✅");
  }
  return null;
}

// ===== PATIENT STORAGE HELPERS =====
const LS_PATIENTS_KEY = 'hinata_patients';
const LS_DELETED_KEY = 'hinata_deleted_ids'; // 削除済みIDのブラックリスト
function loadPatients() {
  try {
    const all = JSON.parse(localStorage.getItem(LS_PATIENTS_KEY) || '[]');
    // ブラックリストのIDを自動除外
    const deletedIds = JSON.parse(localStorage.getItem(LS_DELETED_KEY) || '[]');
    const filtered = deletedIds.length ? all.filter(p => !deletedIds.includes(p.id)) : all;
    // 更新日時の新しい順にソート（updatedAt優先、なければcreatedAt）
    return filtered.sort((a, b) => {
      const ta = a.updatedAt || a.createdAt || '';
      const tb = b.updatedAt || b.createdAt || '';
      return tb.localeCompare(ta);
    });
  } catch (e8) { return []; }
}
function savePatients(list) {
  try { localStorage.setItem(LS_PATIENTS_KEY, JSON.stringify(list)); } catch (e9) {}
}
function addDeletedId(id) {
  try {
    const ids = JSON.parse(localStorage.getItem(LS_DELETED_KEY) || '[]');
    if (!ids.includes(id)) ids.push(id);
    // 最大100件まで保持
    localStorage.setItem(LS_DELETED_KEY, JSON.stringify(ids.slice(-100)));
  } catch(e) {}
}
function isDeletedId(id) {
  try {
    const ids = JSON.parse(localStorage.getItem(LS_DELETED_KEY) || '[]');
    return ids.includes(id);
  } catch(e) { return false; }
}
function loadPatientData(pid) {
  try { return JSON.parse(localStorage.getItem('hinata_data_' + pid) || 'null'); } catch (e10) { return null; }
}
function compressPhotosInData(data) {
  // base64写真を圧縮（canvas経由でJPEG品質を下げる）
  const compressBase64 = (b64) => {
    if (!b64 || !b64.startsWith('data:image')) return b64;
    try {
      const canvas = document.createElement('canvas');
      const img = new Image();
      img.src = b64;
      const MAX = 800;
      let w = img.width || 800, h = img.height || 600;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      return canvas.toDataURL('image/jpeg', 0.5);
    } catch(e) { return b64; }
  };
  if (!data) return data;
  const d = JSON.parse(JSON.stringify(data));
  if (d.contractData) {
    const photoKeys = ['insuranceCardPhoto','careInsurancePhoto','burdenRatioPhoto','selfSupportPhoto','limitAmountPhoto','prescriptionPhoto'];
    if (d.contractData.prescriptionPhotos) d.contractData.prescriptionPhotos = d.contractData.prescriptionPhotos.map(p => compressBase64(p));
    photoKeys.forEach(k => { if (d.contractData[k]) d.contractData[k] = compressBase64(d.contractData[k]); });
    if (d.contractData.handbooks) d.contractData.handbooks.forEach(h => { if (h.photo) h.photo = compressBase64(h.photo); });
    if (d.contractData.otherPublicFunds) d.contractData.otherPublicFunds.forEach(f => { if (f.photo) f.photo = compressBase64(f.photo); });
  }
  return d;
}
function savePatientData(pid, data) {
  const key = 'hinata_data_' + pid;
  try {
    localStorage.setItem(key, JSON.stringify(data));
  } catch (e11) {
    // 容量超過の場合は写真を圧縮して再試行
    console.warn('localStorage容量超過、写真を圧縮して再試行...');
    try {
      const compressed = compressPhotosInData(data);
      localStorage.setItem(key, JSON.stringify(compressed));
      console.log('圧縮保存成功');
    } catch (e12) {
      // それでも失敗する場合は写真を除いて保存
      console.warn('圧縮後も失敗、写真なしで保存');
      try {
        const noPhoto = JSON.parse(JSON.stringify(data));
        if (noPhoto.contractData) {
          ['insuranceCardPhoto','careInsurancePhoto','burdenRatioPhoto','selfSupportPhoto','limitAmountPhoto','prescriptionPhoto'].forEach(k => { noPhoto.contractData[k] = null; });
          if (noPhoto.contractData.handbooks) noPhoto.contractData.handbooks.forEach(h => { h.photo = null; });
        }
        localStorage.setItem(key, JSON.stringify(noPhoto));
      } catch(e13) { console.error('保存完全失敗'); }
    }
  }
}
function deletePatientData(pid) {
  try { localStorage.removeItem('hinata_data_' + pid); } catch (e12) {}
}

// ===== Google Drive データ同期 =====

async function driveLoadPatients() {
  try {
    const res = await fetch(RAILWAY + '/api/list-patients', { cache: 'no-store' });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.success) return null;
    return data.patients; // [{id, fileId, modifiedTime}]
  } catch (e) { return null; }
}

async function driveLoadData(patientId) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 10000); // 10秒タイムアウト
    const res = await fetch(RAILWAY + '/api/load-data/' + patientId, {
      cache: 'no-store',
      signal: controller.signal
    });
    clearTimeout(timer);
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.success || !data.data) return null;
    return data.data;
  } catch (e) {
    console.error('driveLoadData error:', e);
    return null;
  }
}

async function driveSaveData(patientId, patientMeta, allData) {
  try {
    const bodyStr = JSON.stringify({
      patientId,
      patientMeta,
      contractData: allData.contractData,
      emergencyData: allData.emergencyData,
      taskData: allData.taskData,
      recordData: allData.recordData,
    });
    const res = await fetch(RAILWAY + '/api/save-data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: bodyStr,
    });
    const result = await res.json();
    return result.success;
  } catch (e) { return false; }
}

async function driveDeleteData(patientId) {
  try {
    // _apiPostで署名付きリクエストを送信
    const res = await _apiPost('/api/delete-data', { patientId });
    if (!res.ok) return false;
    const result = await res.json();
    return result.success === true;
  } catch (e) { console.error('Drive削除エラー:', e); return false; }
}

    if (initialPatients && initialPatients.length > 0) return initialPatients;
    return loadPatients();
  });
  const [confirmDelete, setConfirmDelete] = React.useState(null);
  const [confirmDelete2, setConfirmDelete2] = React.useState(null); // 2段階目確認

  // Drive同期関数（起動時・手動更新時に使用）
  const syncFromDrive = React.useCallback(async () => {
    setSyncing(true);
    setSyncError('');
    try {
      // DriveのID一覧を取得
      const drivePats = await driveLoadPatients();
      if (!drivePats) {
        setSyncing(false);
        setSyncError('オフライン（ローカルデータを使用中）');

      const updatedPats = [];
      for (const dp of drivePats) {
        if (isDeletedId(dp.id)) continue; // 削除済みIDはスキップ
        // Drive の全データを完全取得してローカルに上書き
        const detail = await driveLoadData(dp.id);
        if (!detail || !detail.contractData) continue; // contractDataがない空ファイルはスキップ
        // ローカルに完全上書き保存（recordDataをトップレベルに展開）
        const normalizedDetail = {
          ...detail,
          recordFields: detail.recordFields || (detail.recordData && detail.recordData.recordFields) || null,

// 電話番号判定：携帯か固定かを判定して正しいフィールドに振り分ける
function classifyPhone(num) {
  if (!num) return { phone: '', mobile: '' };
  const clean = String(num).replace(/[^\d]/g, '');
  // 携帯：090/080/070/060/050で始まる11桁
  if (/^(090|080|070|060|050)/.test(clean)) {
    return { phone: '', mobile: num };
  }
  // IP電話・050
  if (/^050/.test(clean)) {
    return { phone: '', mobile: num };
  }
  // 固定電話
  return { phone: num, mobile: '' };
}

// 2つの電話番号を正しく固定・携帯に振り分ける
function assignPhones(num1, num2) {
  const result = { phone: '', mobilePhone: '' };
  [num1, num2].filter(Boolean).forEach(num => {
    const c = classifyPhone(num);
    if (c.mobile && !result.mobilePhone) result.mobilePhone = num;
    else if (c.phone && !result.phone) result.phone = num;
    else if (c.mobile && !result.phone) result.phone = num; // 両方携帯の場合は2つ目を固定欄に
    else if (c.phone && !result.mobilePhone) result.mobilePhone = num;
  });
  return result;
}

// FSの追記ヘルパー：既存データの下に新情報を追記（重複除去）
function appendText(existing, newText, maxLen) {
  if (!newText) return existing;
  if (!existing) return newText.slice(0, maxLen);
  if (existing.includes(newText.trim())) return existing; // 既に含まれている場合はスキップ
  return (existing + '\n\n【追記】\n' + newText).slice(0, maxLen);
}
// ===== 認証管理 =====
const RAILWAY = 'https://hinata-app-production.up.railway.app';
const SESSION_KEY = 'hinata_session_token_v2'; // v2: 古いセッションを無効化
const USER_KEY = 'hinata_user_info_v2';
// 古いキーをクリア
try { localStorage.removeItem('hinata_session_token'); localStorage.removeItem('hinata_user_info'); } catch(e) {}

function getSessionToken() { return localStorage.getItem(SESSION_KEY); }
function setSessionToken(t) { localStorage.setItem(SESSION_KEY, t); }
function clearSession() { localStorage.removeItem(SESSION_KEY); localStorage.removeItem(USER_KEY); }
function getCachedUser() {
  try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); } catch (e13) { return null; }
}
function setCachedUser(u) { localStorage.setItem(USER_KEY, JSON.stringify(u)); }

async function verifySession() {
  const token = getSessionToken();
  if (!token) return null;
  try {
    const res = await fetch(RAILWAY + '/auth/verify', { headers: { 'X-Session-Token': token } });
    if (!res.ok) { clearSession(); return null; }
    const user = await res.json();
    if (user.ok) { setCachedUser(user); return user; }
    clearSession(); return null;
  } catch (e14) {
    // オフライン時のみキャッシュを利用
    const cached = getCachedUser();
    return cached;
  }
}

// URLパラメータから認証結果を処理
function handleAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  const auth = params.get('auth');
  const token = params.get('token');
  const msg = params.get('msg');
  if (auth === 'ok' && token) {
    setSessionToken(token);
    localStorage.removeItem(USER_KEY); // キャッシュをリセット
    window.history.replaceState({}, '', window.location.pathname);
    return { status: 'ok' };
  }
  if (auth === 'denied') {
    window.history.replaceState({}, '', window.location.pathname);
    return { status: 'denied', email: params.get('email') };
  }
  if (auth === 'error') {
    window.history.replaceState({}, '', window.location.pathname);
    return { status: 'error', msg };
  }
  return null;
}

function App() {
  const [authState, setAuthState] = React.useState('checking'); // checking | ok | login
  const [authUser, setAuthUser] = React.useState(null);
  const [authError, setAuthError] = React.useState('');
  const [currentPatient, setCurrentPatient] = React.useState(null);
  const [patientListVersion, setPatientListVersion] = useState(0);
  const [sortedPatients, setSortedPatients] = useState(null); // 保存後の並び順を保持

  React.useEffect(() => {
    // URLコールバック処理
    const result = handleAuthCallback();
    if (result) {
      if (result.status === 'denied') {
        setAuthError(`このアカウント（${result.email}）は許可されていません。@kokoronohinata.com のアカウントでログインしてください。`);
        setAuthState('login');
        return;
      }
      if (result.status === 'error') {
        setAuthError('ログインに失敗しました。再度お試しください。');
        setAuthState('login');
        return;
      }
    }
    // セッション検証
    verifySession().then(user => {
      if (user) { setAuthUser(user); setAuthState('ok'); }
      else { setAuthState('login'); }
    });
  }, []);

  if (authState === 'checking') {
    return React.createElement('div', {
      className: "min-h-screen flex items-center justify-center",
      style: { background: '#ffe0b2' }
    }, React.createElement('div', { className: "text-amber-700 text-sm font-bold" }, "認証確認中..."));
  }
  if (authState === 'login') {
    return React.createElement(LoginScreen, { onLogin: () => {}, errorMsg: authError });
  }

  const handleLogout = () => {
    clearSession();
    setAuthState('login');
    setAuthUser(null);
    setCurrentPatient(null);
  };

  if (!currentPatient) {
    return React.createElement(PatientSelectScreen, {
      key: patientListVersion,
      initialPatients: sortedPatients, // 保存後の並び順を直接渡す
      onSelect: p => setCurrentPatient(p),
      onNew: p => setCurrentPatient(p),
      user: authUser,
      onLogout: handleLogout,
    });
  }
  return React.createElement(AppInner, { patient: currentPatient, onBack: (pts) => {
        if (pts) {
          savePatients(pts);
          setSortedPatients(pts); // App stateに保存
        }
        setPatientListVersion(v => v + 1);
        setCurrentPatient(null);
      }, user: authUser, onLogout: handleLogout });
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error('AppError:', error, info); }
