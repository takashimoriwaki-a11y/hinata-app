// ===== TOAST =====
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = "info") => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
  }, []);
  return { toasts, success: m => add(m, "success"), error: m => add(m, "error"), info: m => add(m, "info") };
}
function Toasts({ toasts }) {
  return (
    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-2 w-[92vw] max-w-sm pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`px-4 py-3 rounded-xl text-sm font-semibold shadow-xl border pointer-events-auto ${t.type === "success" ? "bg-emerald-900/95 border-emerald-600 text-emerald-100" : t.type === "error" ? "bg-red-900/95 border-red-600 text-red-100" : "bg-slate-700/95 border-slate-600 text-slate-100"}`}>{t.msg}</div>
      ))}
    </div>
  );
}

// 2-value toggle (e.g. 済/未, 有/無, 該当/非該当)
function Toggle2({ val, opts, onChange, colors }) {

  return (

// Multi-option selector (for insurance type etc.)
function ChipSelect({ val, opts, onChange, multi = false }) {
  const toggle = v => {
    if (multi) {
      const arr = val || [];
      onChange(arr.includes(v) ? arr.filter(x => x !== v) : [...arr, v]);
    } else {
      onChange(val === v ? "" : v);
    }
  };
  const isActive = v => multi ? (val || []).includes(v) : val === v;
  return (
    <div className="flex flex-wrap gap-2">
      {opts.map(opt => (
        <button key={opt} onClick={() => toggle(opt)}
          className={`px-4 py-2 rounded-xl text-sm font-bold border transition-all active:scale-95 ${isActive(opt) ? "bg-teal-600 border-teal-500 text-white" : "bg-slate-700/40 border-slate-600 text-slate-400"}`}>
          {opt}
        </button>
      ))}
    </div>
  );
}

// Inline voice button (small)
function VoiceInline({ onText }) {
  const [rec, setRec] = useState(false);
  const mrRef = useRef(); const timerRef = useRef(); const [sec, setSec] = useState(0);
  const stop = () => { if (mrRef.current?.state !== "inactive") mrRef.current?.stop(); clearInterval(timerRef.current); };
  const start = async () => {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(s);
      mrRef.current = mr;
      mr.onstop = () => { s.getTracks().forEach(t => t.stop()); setRec(false); setSec(0); clearInterval(timerRef.current); onText("（録音完了）"); };
      mr.start(); setRec(true); setSec(0);
      timerRef.current = setInterval(() => setSec(x => x + 1), 1000);
    } catch { alert("マイク許可が必要です"); }
  };
  return (
    <button type="button" onClick={rec ? stop : start}
      className={`flex-shrink-0 w-11 h-11 rounded-xl border flex items-center justify-center text-lg transition-all active:scale-95 ${rec ? "bg-red-600 border-red-500 text-white animate-pulse" : "bg-slate-700 border-slate-600 text-slate-300"}`}>
      {rec ? "⏹" : "🎤"}
    </button>
  );
}

// Photo capture button
function PhotoBtn({ photo, onPhoto, label = "写真", autoSelect }) {
  const ref = useRef();
  const handleFile = e => {
    const f = e.target.files?.[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => { onPhoto(ev.target.result); if (autoSelect) autoSelect(); };
    r.readAsDataURL(f);
  };
  return (
    <div className="flex items-center gap-2 mt-2">
      <button onClick={() => ref.current?.click()}
        className="flex items-center gap-1.5 px-3 py-2 bg-amber-500/20 border border-amber-500/40 rounded-xl text-amber-400 text-xs font-bold active:scale-95">
        📷 {photo ? "再撮影" : label}
      </button>
      {photo && <img src={photo} className="w-12 h-12 rounded-xl object-cover border-2 border-emerald-500/50" />}
      <input ref={ref} type="file" accept="image/*" capture="environment" className="hidden" onChange={handleFile} />
    </div>
  );
}

// Business card scan
function CardScanBtn({ onResult, toast }) {
  const ref = useRef();
  const [scanning, setScanning] = useState(false);
  const handle = e => {
    const f = e.target.files?.[0]; if (!f) return;
    setScanning(true);
    const r = new FileReader();
    r.onload = async ev => {
      try {
        const data = ev.target.result.split(",")[1];
        const res = await fetch("https://hinata-app-production.up.railway.app/api/claude", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 500, messages: [{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: f.type, data } }, { type: "text", text: '名刺の画像から情報を読み取り、JSONのみ返してください。キー：{"name":"氏名","organization":"組織名","role":"役職・役割","phone":"電話番号","note":"その他情報"}' }] }] })
        });
        const d = await res.json();
        const txt = d.content?.map(b => b.text || "").join("") || "";
        const parsed = JSON.parse(txt.replace(/```json|```/g, "").trim());
        onResult(parsed);
        toast.success("名刺を読み取りました");
      } catch { toast.error("名刺の読み取りに失敗しました"); }
      finally { setScanning(false); }
    };
    r.readAsDataURL(f);
  };
  return (
    <div>
      <button onClick={() => ref.current?.click()} disabled={scanning}
        className="flex items-center gap-1.5 px-3 py-1.5 bg-purple-500/20 border border-purple-500/40 rounded-xl text-purple-300 text-xs font-bold active:scale-95 disabled:opacity-50">
        {scanning ? "読み取り中…" : "🪪 名刺スキャン"}
      </button>
      <input ref={ref} type="file" accept="image/*" capture="environment" className="hidden" onChange={handle} />
    </div>
  );
}

function FSModal({ onClose, onExtracted, toast }) {

    if (!files.length && !text.trim()) { toast.error("写真またはテキストを入力してください"); return; }
    setLoading(true);
    try {
      const content = [];
      files.filter(f => f.mimeType?.startsWith("image/")).forEach(f => content.push({ type: "image", source: { type: "base64", media_type: f.mimeType, data: f.data } }));
      content.push({ type: "text", text: `フェイスシート・情報提供書から情報を読み取り、JSONのみ返してください。\n${text ? "テキスト:\n" + text : ""}\n\nキー:\n{"userName":"","nameKana":"","gender":"","age":"","birthDate":"YYYY-MM-DD","address":"","phone":"","mobilePhone":"","mainDiagnosis":"","medicalHistory":"既往歴(360字以内)","currentCondition":"病状・処方(440字以内)","diseaseAwareness":"病識(280字以内)","familyMembers":[{"name":"","age":"","relationship":"","cohabitation":"同居 or 別居","occupation":"","contact":"","isKeyPerson":false}],"familySpecialNotes":"","patientRequest":"本人要望(273字以内)","familyRequest":"家族要望(273字以内)","referralRequest":"依頼機関要望(273字以内)","otherServices":"他サービス(320字以内)","handoverNotes":"申し送り(800字以内)","bedrideLevel":"J1/J2/A1/A2/B1/B2/C1/C2 or 空","dementiaLevel":"Ⅰ/Ⅱa/Ⅱb/Ⅲa/Ⅲb/Ⅳ/M or 空","relatedInstitutions":[{"name":"","phone":"","contact":""}],"referralSource":"依頼元機関名","referralPhone":"依頼元電話","familyContact":"緊急連絡先氏名","familyPhone":"緊急連絡先電話","doctorHospital":"主治医病院名","doctorName":"主治医名","supporters":[{"role":"","name":"","phone":"","note":""}]}` });
      const res = await fetch("https://hinata-app-production.up.railway.app/api/claude", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 2500, messages: [{ role: "user", content }] }) });
      const d = await res.json();
      const parsed = JSON.parse(d.content?.map(b => b.text || "").join("").replace(/```json|```/g, "").trim());
      parsed.extractedAt = new Date().toISOString();
      onExtracted(parsed);
      toast.success("フェイスシートを読み取り、両画面に反映しました ✦");
      onClose();
    } catch { toast.error("読み取りに失敗しました。画像を確認してください。"); }
    finally { setLoading(false); }
  };
  return (
    <div className="fixed inset-0 z-50 flex flex-col bg-slate-900/99 backdrop-blur">
      <div className="flex items-center justify-between px-4 py-3 border-b border-slate-700 bg-slate-800/80 flex-shrink-0">
        <div><h2 className="text-base font-bold text-slate-100">📄 フェイスシート読み取り</h2><p className="text-xs text-slate-400 mt-0.5">写真・PDF → 契約チェック＋記録書Ⅰに自動反映</p></div>
        <button onClick={onClose} className="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-700 text-slate-300 active:scale-95 text-lg font-bold">✕</button>
      </div>
      <div className="flex-1 overflow-y-auto px-4 py-4 space-y-4">
        <div className="bg-teal-900/25 border border-teal-700/40 rounded-2xl p-3">
          <p className="text-xs text-teal-300 font-bold mb-2">✦ 読み取り後に自動反映される主な項目</p>
          <div className="grid grid-cols-2 gap-1.5 text-xs">
            {[["契約","利用者名のみ"],["緊急","家族・支援者・主治医"],["記録Ⅰ","全項目（氏名・病歴・ADL等）"],["記録Ⅰ","家族構成・要望・申し送り"]].map(([t,i],n)=>(
              <div key={n} className="flex items-center gap-1.5"><span className={`px-1.5 py-0.5 rounded-full text-[10px] font-bold ${t==="契約"?"bg-amber-900/50 text-amber-300":t==="緊急"?"bg-pink-900/50 text-pink-300":"bg-blue-900/50 text-blue-300"}`}>{t}</span><span className="text-slate-400">{i}</span></div>
            ))}
          </div>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <button onClick={() => camRef.current?.click()} className="flex flex-col items-center gap-2 py-6 rounded-2xl bg-amber-500/10 border-2 border-amber-500/40 text-amber-300 active:scale-[0.97]"><span className="text-4xl">📷</span><span className="text-xs font-bold">カメラで撮影</span></button>
          <button onClick={() => fileRef.current?.click()} className="flex flex-col items-center gap-2 py-6 rounded-2xl bg-teal-500/10 border-2 border-teal-500/40 text-teal-300 active:scale-[0.97]"><span className="text-4xl">📁</span><span className="text-xs font-bold">ファイル選択</span></button>
        </div>
        <input ref={camRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={addFiles} />
        <input ref={fileRef} type="file" accept="image/*,application/pdf" multiple className="hidden" onChange={addFiles} />
        {files.length > 0 && (
          <div className="flex flex-wrap gap-2">{files.map((f,i)=>(
            <div key={i} className="relative">
              {f.mimeType?.startsWith("image/") ? <img src={f.preview} className="w-20 h-20 rounded-xl object-cover border-2 border-teal-600/50" /> : <div className="w-20 h-20 rounded-xl bg-slate-700 border-2 border-slate-600 flex items-center justify-center text-2xl">📄</div>}
              <button onClick={() => setFiles(p => p.filter((_,j)=>j!==i))} className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 rounded-full text-white text-xs flex items-center justify-center font-bold">✕</button>
            </div>
          ))}</div>
        )}
        <TTextarea label="補足テキスト（任意）" value={text} onChange={setText} placeholder="フェイスシートの内容をテキストで貼り付けることも可能です" rows={4} voice />
      </div>
      <div className="px-4 py-4 border-t border-slate-700 bg-slate-800/60 flex-shrink-0">
        <button onClick={extract} disabled={loading || (!files.length && !text.trim())}
          className="w-full h-14 rounded-2xl bg-gradient-to-r from-teal-600 to-emerald-500 disabled:from-slate-700 disabled:to-slate-700 disabled:text-slate-500 text-white font-bold text-base flex items-center justify-center gap-2 shadow-lg active:scale-[0.99]">
          {loading ? <><span className="animate-spin text-xl">⏳</span>AI読み取り中…</> : <><span className="text-xl">✨</span>AIで読み取り → 両方に反映</>}
        </button>
      </div>
    </div>
  );
}

  const isKaigo = data.visitType === "介護保険";

  // 生活保護→医療保険証不要 自動
  useEffect(() => {

      setData(p => ({ ...p, insuranceCard: "不要" }));
    }
  }, [data.welfare]);

  // 自立支援写真→追加自動
  const handleSelfSupportPhoto = photo => {
    setData(p => ({ ...p, selfSupportPhoto: photo, selfSupportMode: "追加", selfSupport: "有" }));
  };

  // 保険証系写真→有自動
  const handleInsPhoto = (photoKey, statusKey) => photo => {
    setData(p => ({ ...p, [photoKey]: photo, [statusKey]: "有" }));
  };

  // 申請者連動
  const handleApplicantChange = (val) => {
    setData(p => ({ ...p, ssApplicant: val, ssSubmitter: val === "その他" ? p.ssSubmitter : val, ssDocLocation: val === "その他" ? p.ssDocLocation : val }));
  };
  const handleAddApplicantChange = (val) => {
    setData(p => ({ ...p, ssAddApplicant: val, ssAddSubmitter: val === "その他" ? p.ssAddSubmitter : val, ssAddDocLocation: val === "その他" ? p.ssAddDocLocation : val }));
  };

  const done = (() => {
    let d = 0, t = 0;
    const bools = [data.importantDoc === "済", data.transport !== "", data.insuranceCard !== "未", data.limitAmount !== "未", data.handbook !== "未", data.aplus !== "未", data.prescription !== "未", data.instruction !== "未", data.namestyle !== "", data.cautionVisitTime, data.cautionTeam, data.cautionStayTime];
    if (isKaigo) { bools.push(data.cautionCareInsNurse, data.cautionCareInsReport); }
    bools.forEach(b => { t++; if (b) d++; });
    return { done: d, total: t };
  })();

  return (
    <div className="pb-8 px-4 pt-4">
      {/* Progress */}
      <div className="bg-slate-800/80 rounded-2xl p-4 mb-4 border border-slate-700">

        <div className="h-2 bg-slate-700 rounded-full overflow-hidden">

          <TInput label="生年月日" type="date" value={data.basicInfo.birthDate}

            placeholder="0742-xx-xxxx" badge={hasFS && !!fs.phone} />
          <TInput label="電話番号（携帯）" type="tel" value={data.basicInfo.mobilePhone}

            placeholder="090-xxxx-xxxx" badge={hasFS && !!fs.mobilePhone} />
          <TInput label="住所" value={data.basicInfo.address}
            onChange={v => setData(p => ({ ...p, basicInfo: { ...p.basicInfo, address: v } }))}

// ===== KANJI CANVAS =====
function KanjiCanvas({ value, onChange }) {
  const canvasRef = useRef();
  const drawing = useRef(false);
  const lastPos = useRef(null);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - rect.left) * (canvas.width / rect.width), y: (src.clientY - rect.top) * (canvas.height / rect.height) };
  };

  const start = e => { e.preventDefault(); drawing.current = true; const pos = getPos(e, canvasRef.current); lastPos.current = pos; };
  const move = e => {
    e.preventDefault();
    if (!drawing.current) return;
    const canvas = canvasRef.current; const ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = "#94d3c3"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.stroke();
    lastPos.current = pos;
  };
  const end = () => { drawing.current = false; };
  const clear = () => { const canvas = canvasRef.current; canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height); };

  return (
    <div className="space-y-2">
      <canvas ref={canvasRef} width={300} height={150}
        className="w-full h-32 bg-slate-700/60 border border-slate-600 rounded-xl cursor-crosshair touch-none"
        onMouseDown={start} onMouseMove={move} onMouseUp={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end} />
      <button onClick={clear} className="text-xs text-slate-400 border border-slate-600 px-3 py-1.5 rounded-lg active:scale-95">クリア</button>
    </div>
  );
}

function CopyableTA({ label, value, onChange, maxLength, rows=4, placeholder, badge }) {
  const [copied, setCopied] = useState(false);
  const isOver = maxLength && value.length > maxLength;
  const copy = async () => { if (!value) return; try { await navigator.clipboard.writeText(value); } catch { const el = document.createElement("textarea"); el.value = value; document.body.appendChild(el); el.select(); document.execCommand("copy"); document.body.removeChild(el); } setCopied(true); setTimeout(() => setCopied(false), 2000); };
  return (
    <div className="space-y-1.5">
      <div className="flex items-center justify-between gap-2">
        <div className="flex items-center gap-2"><label className="text-sm font-medium text-slate-300">{label}</label>{badge&&<FSBadge/>}</div>
        <div className="flex items-center gap-2">
          {maxLength&&<span className={`text-xs tabular-nums ${isOver?"text-red-400 font-semibold":"text-slate-500"}`}>{value.length}/{maxLength}</span>}
          <button type="button" onClick={copy} disabled={!value} className="h-7 px-2 text-xs rounded-lg border border-slate-600 bg-slate-700/50 text-slate-400 hover:text-slate-200 disabled:opacity-40">{copied?"✓ 済":"📋"}</button>

// ===== PROGRESS HELPERS =====
// 進捗状態を返す：{ done, total, hasUndone }
// done: 済の数, total: 全体, hasUndone: 未が1つ以上あるか
function calcContractProgress(d) {
  const items = [
    d.visitType !== "",
    d.welfare !== "",
    d.visitPlace !== "",
    d.team !== "",
    d.staff !== "",
    d.importantDoc === "済",
    d.transport !== "",
    d.addition24h !== "無" ? d.addition24h !== "" : true,
    d.additionMultiple !== "無" ? d.additionMultiple !== "" : true,
    d.insuranceCard !== "未",
    d.careInsurance !== "未",
    d.selfSupport !== "未",
    d.limitAmount !== "未",
    d.handbooks.some(h => h.status === "有"),
    d.aplus === "済",
    (d.prescription === "済" || d.prescription === "処方なし"),
    d.instruction === "済",
    d.namestyle !== "",
    d.cautionVisitTime,
    d.cautionTeam,
    d.cautionStayTime,
  ];
  const done = items.filter(Boolean).length;
  const total = items.length;
  // 「未」の項目を特定チェック（明示的に未選択の項目）
  const hasUndone = [
    d.importantDoc === "未",
    d.transport === "",
    d.insuranceCard === "未",
    d.careInsurance === "未",
    d.selfSupport === "未",
    d.limitAmount === "未",
    d.handbooks.every(h => h.status === "未"),
    d.aplus === "未",
    d.prescription === "未" && d.prescription !== "処方なし",
    d.instruction === "未",
    d.namestyle === "",
    !d.cautionVisitTime,
    !d.cautionTeam,
    !d.cautionStayTime,
  ].some(Boolean);
  return { done, total, hasUndone };
}

function calcEmergencyProgress(d) {
  const items = [];
  // 家族
  if (d.familyMode === "有") {
    d.family.forEach(f => { items.push(!!f.name); items.push(!!f.phone); });
  }
  // 主治医
  items.push(!!d.doctor.hospital);
  // 支援者
  d.supporters.forEach(s => { if (s.name || s.role) items.push(!!s.name); });
  const done = items.filter(Boolean).length;
  const total = Math.max(items.length, 1);
  const hasUndone = items.some(v => !v);
  return { done, total, hasUndone };
}

function calcTaskProgress(d) {
  const vals = Object.values(d.tasks);
  const done = vals.filter(v => v === "済").length;
  const total = vals.length;
  const hasUndone = vals.some(v => v === "未");
  return { done, total, hasUndone };
}

// タブバッジコンポーネント
function TabBadge({ done, total, hasUndone }) {
  if (done === 0 && total > 0) {
    // 何も済んでいない
    return <span className="absolute top-1.5 right-2 w-2.5 h-2.5 rounded-full bg-red-500 border border-slate-900" />;
  }
  if (hasUndone) {
    // 一部未完了
    return <span className="absolute top-1.5 right-2 w-2.5 h-2.5 rounded-full bg-amber-400 border border-slate-900" />;
  }
  if (done === total && total > 0) {
    // 全て済
    return <span className="absolute top-1.5 right-2 text-[10px] leading-none">✅</span>;
  }
  return null;
}

        ...p.basicInfo,
        ...(fs.userName    ? { userName:    fs.userName    } : {}),
        ...(fs.birthDate   ? { birthDate:   fs.birthDate   } : {}),
        ...(fs.phone       ? { phone:       fs.phone       } : {}),
        ...(fs.mobilePhone ? { mobilePhone: fs.mobilePhone } : {}),
        ...(fs.address     ? { address:     fs.address     } : {}),
      }
    }));
    // 指示書：依頼先・主治医
    if (fs.doctorHospital) setContractData(p => ({ ...p, instructionDest: fs.doctorHospital, instructionDoctor: fs.doctorName || "" }));
    // 緊急：家族
    if (fs.familyContact) setEmergencyData(p => ({ ...p, familyMode: "有", family: [{ name: fs.familyContact, relation: "", relationOther: "", phone: fs.familyPhone || "", note: "" }, ...p.family.slice(1)] }));
    // 緊急：主治医
    if (fs.doctorHospital) setEmergencyData(p => ({ ...p, doctor: { hospital: fs.doctorHospital, doctorName: fs.doctorName || "" } }));
    // 緊急：支援者（依頼元 + その他支援者）
    const newSupporters = [];
    if (fs.referralSource) newSupporters.push({ role: "", roleOther: "依頼元", name: fs.referralSource, phone: fs.referralPhone || "", note: "" });
    if (fs.supporters?.length) {
      fs.supporters.forEach(s => newSupporters.push({ role: s.role || "", roleOther: "", name: s.name || "", phone: s.phone || "", note: s.note || "" }));
    }
    if (newSupporters.length) setEmergencyData(p => ({ ...p, supporters: [...newSupporters, { role: "", roleOther: "", name: "", phone: "", note: "" }] }));
  }, [fs.extractedAt]);

  // 進捗計算
  const cprog = calcContractProgress(contractData);
  const eprog = calcEmergencyProgress(emergencyData);
  const tprog = calcTaskProgress(staffTaskData);

  const TABS = [
    { id: "contract",  label: "契約チェック", icon: "📋", prog: cprog },
    { id: "emergency", label: "緊急連絡先",   icon: "📞", prog: eprog },
    { id: "staff",     label: "タスク",       icon: "✅", prog: tprog },
  ];

  return (
    <div>
      {/* 利用者名 + 全体進捗バー */}
      <div className="flex items-center justify-between px-4 py-2 bg-slate-800/50 border-b border-slate-700/50">
        <div>
          {contractData.basicInfo.userName
            ? <span className="text-sm text-teal-400 font-semibold">{contractData.basicInfo.userName}{contractData.basicInfo.contractDate && <span className="text-slate-500 font-normal text-xs ml-2">{contractData.basicInfo.contractDate}</span>}</span>
            : <span className="text-xs text-slate-500">利用者名未入力</span>}
        </div>
        {/* 3タブまとめた全体サマリー */}
        <div className="flex items-center gap-2">
          {cprog.hasUndone || eprog.hasUndone || tprog.hasUndone
            ? <span className="text-xs font-bold text-amber-400">未完了あり</span>
            : cprog.done === cprog.total && eprog.done > 0 && tprog.done === tprog.total
            ? <span className="text-xs font-bold text-emerald-400">✓ 全完了</span>
            : <span className="text-xs text-slate-500">{cprog.done + eprog.done + tprog.done} / {cprog.total + eprog.total + tprog.total} 済</span>
          }
        </div>
      </div>
      <div className="h-1 bg-slate-800">
        <div className="h-full bg-gradient-to-r from-teal-500 to-emerald-400 transition-all duration-500"
          style={{ width: `${(cprog.total + eprog.total + tprog.total) > 0 ? ((cprog.done + eprog.done + tprog.done) / (cprog.total + eprog.total + tprog.total) * 100) : 0}%` }} />
      </div>

      {/* タブバー（バッジ付き） */}
      <div className="flex border-b border-slate-700 bg-slate-800/30">
        {TABS.map(tab => {
          const { done, total, hasUndone } = tab.prog;
          const allDone = done === total && total > 0 && !hasUndone;
          const noneOrUndone = hasUndone && done === 0;
          return (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
              className={`flex-1 py-2 text-xs font-bold transition-all flex flex-col items-center gap-0.5 relative ${activeTab === tab.id ? "text-teal-400 border-b-2 border-teal-500 bg-teal-950/20" : "text-slate-500 border-b-2 border-transparent"}`}>
              <span className="text-sm leading-none">{tab.icon}</span>
              <span>{tab.label}</span>
              {/* バッジ: 全済=✅緑、未あり=🔴赤、一部=🟡黄 */}
              {allDone && (
                <span className="absolute top-1 right-1.5 w-2 h-2 rounded-full bg-emerald-400 border border-slate-900" />
              )}
              {!allDone && hasUndone && done > 0 && (
                <span className="absolute top-1 right-1.5 w-2 h-2 rounded-full bg-amber-400 border border-slate-900" />
              )}
              {!allDone && (done === 0 || (!hasUndone && done < total)) && total > 0 && (
                <span className="absolute top-1 right-1.5 w-2 h-2 rounded-full bg-red-500 border border-slate-900" />
              )}
            </button>
          );
        })}
      </div>

      {activeTab === "contract" && <ContractTab data={contractData} setData={setContractData} fs={fs} onPrescriptionPhoto={onPrescriptionPhoto} />}
      {activeTab === "emergency" && <EmergencyTab data={emergencyData} setData={setEmergencyData} fs={fs} contractData={contractData} toast={toast} />}
      {activeTab === "staff" && <StaffTaskTab data={staffTaskData} setData={setStaffTaskData} />}
    </div>
  );
}

// ===== MAIN APP =====
const MAIN_TABS = [
  { id: "contract", label: "契約チェック", icon: "📋" },
  { id: "record",   label: "記録書Ⅰ",     icon: "📝" },
];

function App() {
  const [mainTab, setMainTab] = useState("contract");
  const [showFS, setShowFS] = useState(false);
  const [faceSheet, setFaceSheet] = useState(emptyFS());
  const [sharedPrescriptionPhoto, setSharedPrescriptionPhoto] = useState(null);
  const toast = useToast();
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
  const fmtDate = d => { const days = ["日","月","火","水","木","金","土"]; return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${days[d.getDay()]})`; };
  const handleFSExtracted = useCallback(data => setFaceSheet(data), []);

  return (
    <div className="min-h-screen bg-slate-900 text-slate-100" style={{ fontFamily: "'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif" }}>
      <Toasts toasts={toast.toasts} />
      {showFS && <FSModal onClose={() => setShowFS(false)} onExtracted={handleFSExtracted} toast={toast} />}

      {/* Header */}
      <header className="sticky top-0 z-30 bg-slate-900/95 backdrop-blur border-b border-slate-800">
        <div className="px-3 pt-3 pb-2 flex items-center gap-2">
          <div className="min-w-0 flex-1">
            <p className="text-[10px] text-slate-500 font-semibold tracking-[0.2em] uppercase">ひなた</p>
            <h1 className="text-base font-bold text-slate-100 leading-tight">契約・看護記録Ⅰアプリ</h1>
          </div>
          <button onClick={() => setShowFS(true)}
            className={`flex flex-col items-center justify-center px-3 py-1.5 rounded-xl font-bold text-xs border transition-all active:scale-95 flex-shrink-0 gap-0.5 ${faceSheet.extractedAt ? "bg-teal-600/20 border-teal-600 text-teal-300" : "bg-amber-500/15 border-amber-500/60 text-amber-300"}`}>
            <span className="text-lg leading-none">📄</span>
            <span className="text-[10px] leading-tight">{faceSheet.extractedAt ? "FS反映済" : "FSスキャン"}</span>
          </button>
          <div className="text-right flex-shrink-0">
            <div className="text-[11px] font-bold text-slate-300 leading-tight">{fmtDate(now)}</div>
            <div className="text-xs text-teal-400 tabular-nums">{String(now.getHours()).padStart(2,"0")}:{String(now.getMinutes()).padStart(2,"0")}</div>
          </div>
        </div>
        {faceSheet.extractedAt && (
          <div className="px-3 pb-2 flex items-center gap-2">
            <div className="flex-1 h-0.5 bg-teal-900/40 rounded-full overflow-hidden"><div className="h-full w-full bg-gradient-to-r from-teal-500 to-emerald-400" /></div>
            <span className="text-[10px] text-teal-400 font-semibold flex-shrink-0">FS読み取り済 ✦ 両画面に反映中</span>
          </div>
        )}
      </header>

      {/* Content */}
      <div className="max-w-lg mx-auto">
        {mainTab === "contract" && <ContractPage fs={faceSheet} toast={toast} onPrescriptionPhoto={setSharedPrescriptionPhoto} />}
        {mainTab === "record"   && <RecordFormPage toast={toast} fs={faceSheet} sharedPrescriptionPhoto={sharedPrescriptionPhoto} />}
      </div>

      {/* Bottom Nav */}
      <nav className="fixed bottom-0 left-0 right-0 z-40 bg-slate-900/95 backdrop-blur border-t border-slate-800">
        <div className="flex max-w-lg mx-auto">
          {MAIN_TABS.map(tab => (
            <button key={tab.id} onClick={() => setMainTab(tab.id)}
              className={`flex-1 flex flex-col items-center gap-1 py-3 px-2 transition-all active:scale-95 relative ${mainTab === tab.id ? "text-teal-400" : "text-slate-500"}`}>
              <span className={`text-2xl leading-none transition-transform ${mainTab === tab.id ? "scale-110" : "scale-100"}`}>{tab.icon}</span>
              <span className="text-[11px] font-bold tracking-tight">{tab.label}</span>
              {mainTab === tab.id && <div className="absolute top-0 left-1/2 -translate-x-1/2 w-10 h-0.5 bg-teal-400 rounded-full" />}
              {faceSheet.extractedAt && <div className="absolute top-2 right-3 w-2 h-2 bg-teal-400 rounded-full" />}
            </button>
          ))}
        </div>
      </nav>
      <div className="h-20" />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
