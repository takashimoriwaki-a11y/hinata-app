function cn(...c) { return c.filter(Boolean).join(" "); }

// ===== TOAST =====
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = "info") => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
  }, []);
  return { toasts, success: m => add(m, "success"), error: m => add(m, "error"), info: m => add(m, "info") };
}
function Toasts({ toasts }) {
  return (
    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-2 w-[92vw] max-w-sm pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`px-4 py-3 rounded-xl text-sm font-semibold shadow-xl border pointer-events-auto ${t.type === "success" ? "bg-emerald-100 border-emerald-500 text-emerald-800" : t.type === "error" ? "bg-red-100 border-red-400 text-red-800" : "bg-white border-slate-300 text-slate-800"}`}>{t.msg}</div>
      ))}
    </div>
  );
}

// 2-value toggle (e.g. 済/未, 有/無, 該当/非該当)
function Toggle2({ val, opts, onChange, colors, large }) {
  // opts: [{label, value, color?}]
  return (
    <div className="flex gap-2">

// Multi-option selector (for insurance type etc.)
function ChipSelect({ val, opts, onChange, multi = false, large = false }) {
  const toggle = v => {
    if (multi) {
      const arr = val || [];
      onChange(arr.includes(v) ? arr.filter(x => x !== v) : [...arr, v]);
    } else {
      onChange(val === v ? "" : v);
    }
  };
  const isActive = v => multi ? (val || []).includes(v) : val === v;
  return (
    <div className="flex flex-wrap gap-2">
      {opts.map(opt => (
        <button key={opt} onClick={() => toggle(opt)}
          className={`${large ? "flex-1 py-5 text-base min-h-[60px]" : "px-5 py-4 text-base min-h-[54px]"} rounded-xl font-bold border transition-all active:scale-95 ${isActive(opt) ? "bg-teal-600 border-teal-500 text-white" : "bg-white border-slate-300 text-slate-600"}`}>
          {opt}
        </button>
      ))}
    </div>
  );
}

// Inline voice button (small)
function VoiceInline({ onText }) {
  const [rec, setRec] = useState(false);
  const mrRef = useRef(); const timerRef = useRef(); const [sec, setSec] = useState(0);
  const stop = () => { if (mrRef.current && mrRef.current.state !== "inactive") mrRef.current && mrRef.current.stop(); clearInterval(timerRef.current); };
  const start = async () => {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(s);
      mrRef.current = mr;
      const chunks = [];
      mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mr.onstop = async () => {
        s.getTracks().forEach(t => t.stop());
        clearInterval(timerRef.current);
        const blob = new Blob(chunks, { type: mr.mimeType || 'audio/webm' });
        // Web Speech API フォールバック（テキスト変換）
        setRec(false); setSec(0);
        onText("（録音完了）");
      };
      mr.start(100); setRec(true); setSec(0);
      timerRef.current = setInterval(() => setSec(x => x + 1), 1000);
    } catch { alert("マイク許可が必要です"); }
  };
  return (
    <button type="button" onClick={rec ? stop : start}
      className={`flex-shrink-0 w-14 h-14 rounded-xl border flex flex-col items-center justify-center gap-0.5 text-xl transition-all active:scale-95 ${rec ? "bg-red-500 border-red-400 text-white animate-pulse" : "bg-slate-200 border-slate-300 text-slate-600"}`}>
      <span>{rec ? "⏹" : "🎤"}</span>
      {rec && <span className="text-[9px] font-bold">{sec}s</span>}
    </button>
  );
}

// Business card scan
function CardScanBtn({ onResult, toast }) {
  const ref = useRef();
  const [scanning, setScanning] = useState(false);
  const handle = e => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    setScanning(true);
    const r = new FileReader();
    r.onload = async ev => {
      try {
        const data = ev.target.result.split(",")[1];
        const res = await fetch("https://hinata-app-production.up.railway.app/api/claude", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 500, messages: [{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: f.type, data } }, { type: "text", text: '名刺の画像から情報を読み取り、JSONのみ返してください。キー：{"name":"氏名","organization":"組織名","role":"役職・役割","phone":"電話番号","note":"その他情報"}' }] }] })
        });
        const d = await res.json();
        const txt = d.content && d.content.map(b => b.text || "").join("") || "";
        const parsed = JSON.parse(txt.replace(/```json|```/g, "").trim());
        onResult(parsed);
        toast.success("名刺を読み取りました");
      } catch { toast.error("名刺の読み取りに失敗しました"); }
      finally { setScanning(false); }
    };
    r.readAsDataURL(f);
  };
  return (
    <div>
      <button onClick={() => ref.current && ref.current.click()} disabled={scanning}
        className="flex flex-col items-center justify-center gap-1.5 px-6 py-4 bg-purple-100 border border-purple-300 rounded-xl text-purple-700 font-bold active:scale-95 disabled:opacity-50 min-h-[72px]">
        <span className="text-2xl leading-none">🪪</span>
        <span className="text-sm">{scanning ? "読み取り中…" : "名刺スキャン"}</span>
      </button>
      <input ref={ref} type="file" accept="image/*" capture="environment" className="hidden" onChange={handle} />
    </div>
  );
}

// ===== FACESHEET MODAL =====
function FSModal({ onClose, onExtracted, toast }) {
  const [files, setFiles] = useState([]); const [text, setText] = useState(""); const [loading, setLoading] = useState(false);
  const fileRef = useRef(); const camRef = useRef();
  const compressImage = (file) => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 1600;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.85);
        resolve({ name: file.name, mimeType: 'image/jpeg', data: compressed.split(',')[1], preview: compressed });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
  const addFiles = e => Array.from(e.target.files || []).forEach(async f => {
    if (f.type.startsWith('image/')) {
      const compressed = await compressImage(f);
      setFiles(p => [...p, compressed]);
    } else {
      const r = new FileReader();
      r.onload = ev => setFiles(p => [...p, { name: f.name, mimeType: f.type, data: ev.target.result.split(",")[1], preview: ev.target.result }]);
      r.readAsDataURL(f);
    }
  });
  const extract = async () => {
    if (!files.length && !text.trim()) { toast.error("写真またはテキストを入力してください"); return; }
    setLoading(true);
    try {
      const content = [];
      files.filter(f => f.mimeType && f.mimeType.startsWith("image/")).forEach(f => content.push({ type: "image", source: { type: "base64", media_type: f.mimeType, data: f.data } }));
      content.push({ type: "text", text: `あなたは精神科・在宅医療に精通した訪問看護ステーションの熟練事務スタッフ兼医療記録の専門家です。訪問看護フェイスシート・情報提供書・アセスメント票・ケアプランの画像を精密に読み取ります。

【チェックボックス・選択欄の読み取りルール（最重要）】
- ✓、✔、レ点、○、●、■が付いている項目＝その内容が「該当・選択・実施あり」
- □（空のチェックボックス）、空欄＝非該当・なし
- チェックされた複数の項目は全て読み取り、自然な文章にまとめる
- 例：「□介護保険 ✓自立支援 □医療保険」→「自立支援医療を利用している」
- 例：「✓定期（週2回）□不定期」→「定期訪問（週2回）」
- 例：「✓有□無（薬の有無）」→「内服薬あり」

【医療用語・介護用語の正確な変換】
＜疾患・症状＞
- Alz.、アルツ → アルツハイマー型認知症
- VaD、脳血管性認知症 → 脳血管性認知症
- DLB → レビー小体型認知症
- HTN、高血圧 → 高血圧症
- DM、糖尿病 → 2型糖尿病
- CKD → 慢性腎臓病
- COPD → 慢性閉塞性肺疾患
- CHF、心不全 → 慢性心不全
- CVA、脳梗塞、脳卒中 → 脳梗塞後遺症（または脳出血後遺症）
- OP → 骨粗鬆症
- Ca → 癌（部位を含めて記載）
- Fx → 骨折（部位を含めて）
- TKA、THA → 人工膝関節置換術後、人工股関節置換術後
- 統合失調症、精神分裂 → 統合失調症
- うつ病、うつ状態 → うつ病（または抑うつ状態）
- BPD → 双極性障害

＜介護・福祉＞
- 要支1/2 → 要支援1/2
- 要介1〜5 → 要介護1〜5
- 自立支援医療（精神）→ 精神通院医療（自立支援医療）
- 身障手帳 → 身体障害者手帳
- 精神手帳、精保手帳 → 精神障害者保健福祉手帳
- 療育手帳 → 療育手帳（知的障害）
- GH → グループホーム
- CH → ケアハウス
- DS、デイ → デイサービス
- DC → デイケア（精神科デイケアまたは介護デイケア）
- HH、ヘルパー → 訪問介護
- 訪看 → 訪問看護
- 往診 → 往診（定期）
- CM → ケアマネジャー
- PSW → 精神科ソーシャルワーカー
- OT → 作業療法士
- PT → 理学療法士
- ST → 言語聴覚士
- Dr → 医師

＜薬・処方＞
- 内服、内用薬 → 内服薬
- 頓服 → 頓服薬（必要時）
- 点滴、IVH → 点滴投与
- 麻薬 → 医療用麻薬（オピオイド）
- インスリン → インスリン自己注射

＜ADL・状態＞
- ADL自立 → 日常生活動作は自立
- 一部介助 → 一部介助が必要
- 全介助 → 全面的な介助が必要
- 見守り → 見守り・声かけが必要
- IADL → 手段的日常生活動作

【その他の読み取りルール】
- 手書き文字・かすれた文字も文脈から推測して正確に読む
- 画像が複数ある場合は全画像の情報を統合する
- 住所は〒番号・都道府県から番地・アパート名まで完全に記載
- 電話番号はハイフン付きで正確に（例：0742-65-0372）
- 生年月日はYYYY-MM-DD形式（例：1940-12-03）
- bedrideLevel：障害老人日常生活自立度 → J1/J2/A1/A2/B1/B2/C1/C2

function ContractTab({ data, setData, fs, onPrescriptionPhoto, toast }) {
  const set = (key, val) => setData(p => ({ ...p, [key]: val }));
  const hasFS = !!fs.extractedAt;
  const isKaigo = data.visitType === "介護保険";

  // 生活保護→医療保険証不要＋アプラス「生活保護」自動
  useEffect(() => {
    if (data.welfare === "該当") {
      setData(p => ({
        ...p,
        insuranceCard: p.insuranceCard !== "不要" ? "不要" : p.insuranceCard,
        aplus: p.aplus !== "済" ? "生活保護" : p.aplus,
      }));
    }
  }, [data.welfare]);

  // 医療機関1の入力 → 指示書の依頼先・主治医に自動反映
  const firstVisitHospital = data.nextVisits && data.nextVisits[0] ? data.nextVisits[0].hospital : "";
  const firstVisitDoctor = data.nextVisits && data.nextVisits[0] ? data.nextVisits[0].doctor : "";
  useEffect(() => {
    if (!firstVisitHospital && !firstVisitDoctor) return;
    setData(p => ({
      ...p,
      instructionDest: firstVisitHospital || p.instructionDest,
      instructionDoctor: firstVisitDoctor || p.instructionDoctor,
    }));
  }, [firstVisitHospital, firstVisitDoctor]);

  // 自立支援写真→追加自動

    setData(p => ({ ...p, selfSupportPhoto: photo, selfSupportMode: "追加", selfSupport: "有" }));
  };

  // 保険証系写真→有自動

    setData(p => ({ ...p, [photoKey]: photo, ...(photo ? { [statusKey]: "有" } : {}) }));
  };

  // 申請者連動

    setData(p => ({ ...p, ssApplicant: val, ssSubmitter: val === "その他" ? p.ssSubmitter : val, ssDocLocation: val === "その他" ? p.ssDocLocation : val }));
  };

    setData(p => ({ ...p, ssAddApplicant: val, ssAddSubmitter: val === "その他" ? p.ssAddSubmitter : val, ssAddDocLocation: val === "その他" ? p.ssAddDocLocation : val }));

  const photos = [
    { label: "処方内容", photo: data.prescriptionPhoto },
    { label: "医療保険証", photo: data.insuranceCardPhoto },
    { label: "介護保険証", photo: data.careInsurancePhoto },
    { label: "負担割合証", photo: data.burdenRatioPhoto },
    { label: "自立支援医療受給者証", photo: data.selfSupportPhoto },
    { label: "限度額認定証", photo: data.limitAmountPhoto },
    ...(data.handbooks || []).map((hb, i) => ({
      label: `手帳${data.handbooks.length > 1 ? (i + 1) : ""}`,
      photo: hb.photo,
    })),
  ].filter(p => p.photo);

  const handleUpload = async () => {
    if (photos.length === 0) {
      toast.error("送信する写真がありません");
      return;
    }
    setUploading(true);
    try {
      const payload = {
        userName: data.basicInfo && data.basicInfo.userName || "不明",
        photos: photos.map(p => ({
          label: p.label,
          data: p.photo.split(",")[1],
          mimeType: "image/jpeg",
        })),
      };
      const res = await fetch("https://hinata-app-production.up.railway.app/api/upload-photos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const result = await res.json();
      if (result.success) {
        setDone(true);
        setFolderUrl(result.folderUrl);
        toast.success(`${photos.length}枚をDriveに送信しました ✦`);
      } else {
        throw new Error(result.error || "送信失敗");
      }
    } catch (err) {
      toast.error("送信に失敗しました: " + err.message);
    } finally {
      setUploading(false);
    }
  };

  return (
    <div className="px-1 pb-4">
      <div className="bg-sky-50 border border-sky-200 rounded-2xl p-4">
        <p className="text-sm font-bold text-sky-800 mb-1">📁 書類写真をGoogle Driveに送信</p>
        <p className="text-xs text-sky-600 mb-3">
          {photos.length > 0
            ? `送信対象: ${photos.map(p => p.label).join("・")}（${photos.length}枚）`
            : "写真が撮影されていません"}
        </p>
        <button onClick={handleUpload}
          disabled={uploading || photos.length === 0}
          className="w-full py-4 rounded-xl font-bold text-base border transition-all active:scale-95 disabled:opacity-40 flex items-center justify-center gap-2 bg-sky-600 border-sky-500 text-white">
          {uploading
            ? <><span className="animate-spin text-xl">⏳</span><span>送信中…</span></>
            : done
            ? <><span>✓</span><span>送信完了</span></>
            : <><span>📤</span><span>Driveに送信してChatに通知</span></>}
        </button>
        {done && folderUrl && (
          <p className="text-xs text-sky-700 mt-2 text-center">
            ✓ Google Chatにも通知済み
          </p>
        )}
      </div>
    </div>
  );
}

// ===== KANJI CANVAS =====
function KanjiCanvas({ value, onChange }) {
  const canvasRef = useRef();
  const drawing = useRef(false);
  const lastPos = useRef(null);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - rect.left) * (canvas.width / rect.width), y: (src.clientY - rect.top) * (canvas.height / rect.height) };
  };

  const start = e => { e.preventDefault(); drawing.current = true; const pos = getPos(e, canvasRef.current); lastPos.current = pos; };
  const move = e => {
    e.preventDefault();
    if (!drawing.current) return;
    const canvas = canvasRef.current; const ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = "#94d3c3"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.stroke();
    lastPos.current = pos;
  };
  const end = () => { drawing.current = false; };
  const clear = () => { const canvas = canvasRef.current; canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height); };

  return (
    <div className="space-y-2">
      <canvas ref={canvasRef} width={600} height={300}
        className="w-full h-56 bg-slate-100 border border-slate-300 rounded-xl cursor-crosshair touch-none"
        style={{WebkitUserSelect:'none',userSelect:'none',WebkitTouchCallout:'none'}}
        onContextMenu={e => e.preventDefault()}
        onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end} onTouchCancel={end} />
      <button onClick={clear} className="text-xs text-slate-500 border border-slate-200 px-3 py-1.5 rounded-lg active:scale-95">クリア</button>
    </div>
  );
}

  const copy = async () => { if (!value) return; try { await navigator.clipboard.writeText(value); } catch { const el = document.createElement("textarea"); el.value = value; document.body.appendChild(el); el.select(); document.execCommand("copy"); document.body.removeChild(el); } setCopied(true); setTimeout(() => setCopied(false), 2000); };
  return (
    <div className="space-y-1.5">
      <div className="flex items-center justify-between gap-2">
        <div className="flex items-center gap-2"><label className="text-sm font-medium text-slate-600">{label}</label>{badge&&<FSBadge/>}</div>

        <VoiceInline onText={t=>onChange(value?value+"\n"+t:t)} />
      </div>
      <button type="button" onClick={copy} disabled={!value}
        className={`w-full py-4 rounded-xl border text-base font-bold transition-all active:scale-[0.99] disabled:opacity-40 flex items-center justify-center gap-2 ${copied ? "bg-teal-100 border-teal-500 text-teal-800" : "bg-white border-slate-300 text-slate-700"}`}>

  );

        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: mimeType, data: base64 } },

【処方内容】
" + text

" + text

// ===== PROGRESS HELPERS =====
// 進捗状態を返す：{ done, total, hasUndone }
// done: 済の数, total: 全体, hasUndone: 未が1つ以上あるか
function calcContractProgress(d) {
  const bi = d.basicInfo || {};
  const isKaigo = d.visitType === "介護保険";
  const items = [
    !!bi.userName, !!bi.birthDate, !!bi.address, !!bi.contractDate,
    d.visitType !== "", d.welfare !== "", d.visitPlace !== "",
    d.team !== "",
    d.importantDoc === "済", d.transport !== "",
    d.insuranceCard !== "未", d.careInsurance !== "未",
    d.burdenRatio !== "未", d.selfSupport !== "未", d.limitAmount !== "未",
    d.handbooks && d.handbooks.some(h => h.status !== "未"),
    d.aplus === "済" || d.aplus === "生活保護",
    d.prescription === "済" || d.prescription === "処方なし",
    d.instruction === "済", !!d.instructionDest, !!d.instructionDoctor,
    !!d.instructionDate, !!d.instructionStart, !!d.instructionReason,
    d.namestyle !== "",
    d.cautionVisitTime, d.cautionTeam, d.cautionStayTime, d.cautionHoliday,
    ...(isKaigo ? [d.cautionCareInsNurse, d.cautionCareInsReport] : []),
  ];
  const done = items.filter(Boolean).length;
  const total = items.length;
  const hasUndone = [
    !bi.userName, !bi.birthDate, !bi.address, !bi.contractDate,
    d.visitType === "", d.welfare === "", d.visitPlace === "", d.team === "",
    d.importantDoc === "未", d.transport === "",
    d.insuranceCard === "未", d.careInsurance === "未",
    d.burdenRatio === "未", d.selfSupport === "未", d.limitAmount === "未",
    d.handbooks && d.handbooks.every(h => h.status === "未"),
    d.aplus === "未",
    d.prescription === "未",
    d.instruction === "未", !d.instructionDest, !d.instructionDoctor,
    !d.instructionDate, !d.instructionStart, !d.instructionReason,
    d.namestyle === "",
    !d.cautionVisitTime, !d.cautionTeam, !d.cautionStayTime, !d.cautionHoliday,
  ].some(Boolean);
  return { done, total, hasUndone };
}

function calcEmergencyProgress(d) {
  const items = [];
  // 家族
  if (d.familyMode === "有") {
    d.family.forEach(f => { items.push(!!f.name); items.push(!!f.phone); });
  }
  // 主治医
  items.push(!!d.doctor.hospital);
  // 支援者
  d.supporters.forEach(s => { if (s.name || s.role) items.push(!!s.name); });
  const done = items.filter(Boolean).length;
  const total = Math.max(items.length, 1);
  const hasUndone = items.some(v => !v);
  return { done, total, hasUndone };
}

function calcTaskProgress(d) {
  const vals = Object.values(d.tasks);
  const done = vals.filter(v => v === "済").length;
  const total = vals.length;
  const hasUndone = vals.some(v => v === "未");
  return { done, total, hasUndone };
}

// タブバッジコンポーネント
function TabBadge({ done, total, hasUndone }) {
  if (done === 0 && total > 0) {
    // 何も済んでいない
    return <span className="absolute top-1.5 right-2 w-2.5 h-2.5 rounded-full bg-red-500 border border-slate-900" />;
  }
  if (hasUndone) {
    // 一部未完了
    return <span className="absolute top-1.5 right-2 w-2.5 h-2.5 rounded-full bg-amber-400 border border-slate-900" />;
  }
  if (done === total && total > 0) {
    // 全て済
    return <span className="absolute top-1.5 right-2 text-[10px] leading-none">✅</span>;
  }
  return null;
}

// ===== CONTRACT PAGE (inner tabs) =====
function ContractPage({ fs, toast, onPrescriptionPhoto }) {
  const [activeTab, setActiveTab] = useState("contract");
  const [contractData, setContractData] = useState(initContract());
  const [emergencyData, setEmergencyData] = useState(initEmergency());

  // 医療機関1 → 緊急連絡先の主治医に自動反映
  const nv0hospital = contractData.nextVisits && contractData.nextVisits[0] ? contractData.nextVisits[0].hospital : "";
  const nv0doctor = contractData.nextVisits && contractData.nextVisits[0] ? contractData.nextVisits[0].doctor : "";
  useEffect(() => {
    if (!nv0hospital && !nv0doctor) return;
    setEmergencyData(p => ({
      ...p,
      doctor: {
        hospital: nv0hospital || (p.doctor && p.doctor.hospital) || "",
        doctorName: nv0doctor || (p.doctor && p.doctor.doctorName) || "",
      }
    }));
  }, [nv0hospital, nv0doctor]);
  const [staffTaskData, setStaffTaskData] = useState(initOffice());

  useEffect(() => {
    if (!fs.extractedAt) return;
    // 利用者名のみ反映
    setContractData(p => ({
      ...p,
      basicInfo: {
        ...p.basicInfo,
        ...(fs.userName    ? { userName:    fs.userName    } : {}),
        ...(fs.birthDate   ? { birthDate:   fs.birthDate   } : {}),
        ...(fs.phone       ? { phone:       fs.phone       } : {}),
        ...(fs.mobilePhone ? { mobilePhone: fs.mobilePhone } : {}),
        ...(fs.address     ? { address:     fs.address     } : {}),
      }
    }));
    // 指示書：依頼先・主治医
    if (fs.doctorHospital) setContractData(p => ({ ...p, instructionDest: fs.doctorHospital, instructionDoctor: fs.doctorName || "" }));
    // 緊急：家族
    if (fs.familyContact) setEmergencyData(p => ({ ...p, familyMode: "有", family: [{ name: fs.familyContact, relation: "", relationOther: "", phone: fs.familyPhone || "", note: "" }, ...p.family.slice(1)] }));
    // 緊急：主治医
    if (fs.doctorHospital) setEmergencyData(p => ({ ...p, doctor: { hospital: fs.doctorHospital, doctorName: fs.doctorName || "" } }));
    // 緊急：支援者（依頼元 + その他支援者）
    const newSupporters = [];
    if (fs.referralSource) newSupporters.push({ role: "", roleOther: "依頼元", name: fs.referralSource, phone: fs.referralPhone || "", note: "" });
    if (fs.supporters && fs.supporters.length) {
      fs.supporters.forEach(s => newSupporters.push({ role: s.role || "", roleOther: "", name: s.name || "", phone: s.phone || "", note: s.note || "" }));
    }
    if (newSupporters.length) setEmergencyData(p => ({ ...p, supporters: [...newSupporters, { role: "", roleOther: "", name: "", phone: "", note: "" }] }));
  }, [fs.extractedAt]);

  // 進捗計算
  const cprog = calcContractProgress(contractData);
  const eprog = calcEmergencyProgress(emergencyData);
  const tprog = calcTaskProgress(staffTaskData);

  const TABS = [
    { id: "contract",  label: "契約チェック", icon: "📋", prog: cprog },
    { id: "emergency", label: "緊急連絡先",   icon: "📞", prog: eprog },
    { id: "staff",     label: "タスク",       icon: "✅", prog: tprog },
  ];

  return (
    <div>
      {/* 利用者名 + 全体進捗バー */}
      <div className="flex items-center justify-between px-4 py-2 bg-slate-200/50 border-b border-slate-700/50">
        <div>
          {contractData.basicInfo.userName
            ? <span className="text-sm text-teal-700 font-semibold">{contractData.basicInfo.userName}{contractData.basicInfo.contractDate && <span className="text-slate-500 font-normal text-xs ml-2">{contractData.basicInfo.contractDate}</span>}</span>
            : <span className="text-xs text-slate-500">利用者名未入力</span>}
        </div>
        {/* 3タブまとめた全体サマリー */}
        <div className="flex items-center gap-2">
          {cprog.hasUndone || eprog.hasUndone || tprog.hasUndone
            ? <span className="text-xs font-bold text-amber-700">未完了あり</span>
            : cprog.done === cprog.total && eprog.done > 0 && tprog.done === tprog.total
            ? <span className="text-xs font-bold text-emerald-700">✓ 全完了</span>
            : <span className="text-xs text-slate-500">{cprog.done + eprog.done + tprog.done} / {cprog.total + eprog.total + tprog.total} 済</span>
          }
        </div>
      </div>
      <div className="h-1 bg-slate-200">
        <div className="h-full bg-gradient-to-r from-teal-500 to-emerald-400 transition-all duration-500"
          style={{ width: `${(cprog.total + eprog.total + tprog.total) > 0 ? ((cprog.done + eprog.done + tprog.done) / (cprog.total + eprog.total + tprog.total) * 100) : 0}%` }} />
      </div>

      {/* タブバー（バッジ付き） */}
      <div className="flex border-b border-slate-700 bg-slate-200/30">
        {TABS.map(tab => {
          const { done, total, hasUndone } = tab.prog;
          const allDone = done === total && total > 0 && !hasUndone;
          const noneOrUndone = hasUndone && done === 0;
          return (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
              className={`flex-1 py-3 text-sm font-bold transition-all flex flex-col items-center gap-0.5 relative ${activeTab === tab.id ? "text-white bg-teal-600 rounded-xl shadow-md" : "text-slate-500 bg-white border border-slate-200 rounded-xl"}`}>
              <span className="text-sm leading-none">{tab.icon}</span>
              <span>{tab.label}</span>
              {/* バッジ: 全済=✅緑、未あり=🔴赤、一部=🟡黄 */}
              {allDone && (
                <span className="absolute top-1 right-1.5 w-2 h-2 rounded-full bg-emerald-400 border border-slate-900" />
              )}
              {!allDone && hasUndone && done > 0 && (
                <span className="absolute top-1 right-1.5 w-2 h-2 rounded-full bg-amber-400 border border-slate-900" />
              )}
              {!allDone && (done === 0 || (!hasUndone && done < total)) && total > 0 && (
                <span className="absolute top-1 right-1.5 w-2 h-2 rounded-full bg-red-500 border border-slate-900" />
              )}
            </button>
          );
        })}
      </div>

      {activeTab === "contract" && <ContractTab data={contractData} setData={setContractData} fs={fs} onPrescriptionPhoto={onPrescriptionPhoto} toast={toast} />}
      {activeTab === "emergency" && <EmergencyTab data={emergencyData} setData={setEmergencyData} fs={fs} contractData={contractData} toast={toast} />}
      {activeTab === "staff" && <StaffTaskTab data={staffTaskData} setData={setStaffTaskData} />}
    </div>
  );
}

// ===== MAIN APP =====
const MAIN_TABS = [
  { id: "contract", label: "契約チェック", icon: "📋" },
  { id: "record",   label: "記録書Ⅰ",     icon: "📝" },
];

function App() {
  const [mainTab, setMainTab] = useState("contract");
  const [showFS, setShowFS] = useState(false);
  const [faceSheet, setFaceSheet] = useState(emptyFS());
  const [sharedPrescriptionPhoto, setSharedPrescriptionPhoto] = useState(null);
  const [recordFields, setRecordFields] = useState(emptyRecord());
  const [recordTranscriptText, setRecordTranscriptText] = useState("");
  const [recordUploadedFiles, setRecordUploadedFiles] = useState([]);
  const [recordHasExtracted, setRecordHasExtracted] = useState(false);
  const [recordPrescriptionRead, setRecordPrescriptionRead] = useState(false);
  const toast = useToast();
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
  const fmtDate = d => { const days = ["日","月","火","水","木","金","土"]; return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${days[d.getDay()]})`; };
  const handleFSExtracted = useCallback(data => setFaceSheet(data), []);



  return (
    <div className="min-h-screen bg-slate-200 text-slate-800" style={{ fontFamily: "'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif" }}>
      <Toasts toasts={toast.toasts} />
      {showFS && <FSModal onClose={() => setShowFS(false)} onExtracted={handleFSExtracted} toast={toast} />}

      {/* Header */}
      <header className="sticky top-0 z-30 bg-white backdrop-blur border-b border-slate-200 shadow-sm">
        {/* 1行目：ロゴ＋アプリ名 / 日時 */}
        <div className="px-3 pt-2 pb-1.5 flex items-center justify-between gap-2">
          <div className="flex items-center gap-2 min-w-0">
            <img src={LOGO_URL} alt="ひなた" className="w-8 h-8 rounded-lg flex-shrink-0 object-cover shadow-sm" />
            <div className="min-w-0">
              <p className="text-[10px] text-slate-500 font-semibold tracking-[0.2em] uppercase">ひなた</p>
              <h1 className="text-sm font-bold text-slate-800 leading-tight whitespace-nowrap">契約・看護記録Ⅰアプリ</h1>
            </div>
          </div>
          <div className="text-right flex-shrink-0">
            <div className="text-[10px] font-bold text-slate-600 leading-tight">{fmtDate(now)}</div>
            <div className="text-[11px] text-teal-700 tabular-nums">{String(now.getHours()).padStart(2,"0")}:{String(now.getMinutes()).padStart(2,"0")}</div>
          </div>
        </div>
        {/* 2行目：FSスキャンボタン（全幅） */}
        <div className="px-3 pb-2">
          <button onClick={() => setShowFS(true)}
            className={`w-full flex items-center justify-center gap-2 py-4 rounded-xl font-bold text-base border transition-all active:scale-95 ${faceSheet.extractedAt ? "bg-teal-100 border-teal-600 text-teal-800" : "bg-amber-100 border-amber-400 text-amber-800"}`}>
            <span className="text-2xl leading-none">📄</span>
            <span>{faceSheet.extractedAt ? "FS反映済 ✦ タップして再スキャン" : "📋 フェイスシートをスキャン"}</span>
          </button>
        </div>
        {faceSheet.extractedAt && (
          <div className="px-3 pb-2 flex items-center gap-2">
            <div className="flex-1 h-0.5 bg-teal-100 rounded-full overflow-hidden"><div className="h-full w-full bg-gradient-to-r from-teal-500 to-emerald-400" /></div>
            <span className="text-[10px] text-teal-800 font-semibold flex-shrink-0">FS読み取り済 ✦ 両画面に反映中</span>
          </div>
        )}
      </header>

      {/* Content */}
      <div className="max-w-lg mx-auto">
        <div style={{display: mainTab === "contract" ? "block" : "none"}}>
            <ContractPage fs={faceSheet} toast={toast} onPrescriptionPhoto={setSharedPrescriptionPhoto} />
          </div>
        <div style={{display: mainTab === "record" ? "block" : "none"}}>
            <RecordFormPage
              toast={toast} fs={faceSheet} sharedPrescriptionPhoto={sharedPrescriptionPhoto}
              fields={recordFields} setFields={setRecordFields}
              transcriptText={recordTranscriptText} setTranscriptText={setRecordTranscriptText}
              uploadedFiles={recordUploadedFiles} setUploadedFiles={setRecordUploadedFiles}
              hasExtracted={recordHasExtracted} setHasExtracted={setRecordHasExtracted}
              prescriptionRead={recordPrescriptionRead} setPrescriptionRead={setRecordPrescriptionRead}
            />
          </div>
      </div>

      {/* Bottom Nav */}
      <nav className="fixed bottom-0 left-0 right-0 z-40 bg-white border-t border-slate-200 shadow-md">
        <div className="flex max-w-lg mx-auto">
          {MAIN_TABS.map(tab => (
            <button key={tab.id} onClick={() => setMainTab(tab.id)}
              className={`flex-1 flex flex-col items-center gap-1 py-3 px-2 transition-all active:scale-95 relative ${mainTab === tab.id ? "text-teal-700 bg-teal-50 rounded-xl mx-1" : "text-slate-400"}`}>
              <span className={`text-2xl leading-none transition-transform ${mainTab === tab.id ? "scale-115" : "scale-100"}`}>{tab.icon}</span>
              <span className="text-[11px] font-bold tracking-tight">{tab.label}</span>
              {mainTab === tab.id && <div className="absolute top-0 left-1/2 -translate-x-1/2 w-10 h-0.5 bg-teal-400 rounded-full" />}
              {faceSheet.extractedAt && <div className="absolute top-2 right-3 w-2 h-2 bg-teal-400 rounded-full" />}
            </button>
          ))}
        </div>
      </nav>
      <div className="h-20" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
setTimeout(() => {
  const splash = document.getElementById('splash');
  if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 600); }
}, 800);
</script>
</body>
</html>
