// ===== TOAST =====
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = "info") => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
  }, []);
  return { toasts, success: m => add(m, "success"), error: m => add(m, "error"), info: m => add(m, "info") };
}
function Toasts({ toasts }) {
  return (
    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-2 w-[92vw] max-w-sm pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`px-4 py-3 rounded-xl text-sm font-semibold shadow-xl border pointer-events-auto ${t.type === "success" ? "bg-emerald-100 border-emerald-500 text-emerald-800" : t.type === "error" ? "bg-red-100 border-red-400 text-red-800" : "bg-white border-slate-300 text-slate-800"}`}>{t.msg}</div>
      ))}
    </div>
  );
}

// 2-value toggle (e.g. 済/未, 有/無, 該当/非該当)

// Multi-option selector (for insurance type etc.)
function ChipSelect({ val, opts, onChange, multi = false, large = false }) {
  const toggle = v => {
    if (multi) {
      const arr = val || [];
      onChange(arr.includes(v) ? arr.filter(x => x !== v) : [...arr, v]);
    } else {
      onChange(val === v ? "" : v);
    }
  };
  const isActive = v => multi ? (val || []).includes(v) : val === v;
  return (
    <div className="flex flex-wrap gap-2">
      {opts.map(opt => (
        <button key={opt} onClick={() => toggle(opt)}
          className={`${large ? "flex-1 py-5 text-base min-h-[60px]" : "px-5 py-4 text-base min-h-[54px]"} rounded-xl font-bold border transition-all active:scale-95 ${isActive(opt) ? "bg-teal-600 border-teal-500 text-white" : "bg-white border-slate-300 text-slate-600"}`}>
          {opt}
        </button>
      ))}
    </div>
  );
}

// Inline voice button (small)
function VoiceInline({ onText }) {
  const [rec, setRec] = useState(false);
  const mrRef = useRef(); const timerRef = useRef(); const [sec, setSec] = useState(0);
  const stop = () => { if (mrRef.current && mrRef.current.state !== "inactive") mrRef.current && mrRef.current.stop(); clearInterval(timerRef.current); };
  const start = async () => {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(s);
      mrRef.current = mr;
      const chunks = [];
      mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mr.onstop = async () => {
        s.getTracks().forEach(t => t.stop());
        clearInterval(timerRef.current);
        const blob = new Blob(chunks, { type: mr.mimeType || 'audio/webm' });
        // Web Speech API フォールバック（テキスト変換）
        setRec(false); setSec(0);
        onText("（録音完了）");
      };
      mr.start(100); setRec(true); setSec(0);
      timerRef.current = setInterval(() => setSec(x => x + 1), 1000);
    } catch { alert("マイク許可が必要です"); }
  };
  return (
    <button type="button" onClick={rec ? stop : start}
      className={`flex-shrink-0 w-14 h-14 rounded-xl border flex flex-col items-center justify-center gap-0.5 text-xl transition-all active:scale-95 ${rec ? "bg-red-500 border-red-400 text-white animate-pulse" : "bg-slate-200 border-slate-300 text-slate-600"}`}>
      <span>{rec ? "⏹" : "🎤"}</span>
      {rec && <span className="text-[9px] font-bold">{sec}s</span>}
    </button>
  );
}

// Photo capture button

// Business card scan
function CardScanBtn({ onResult, toast }) {
  const ref = useRef();
  const [scanning, setScanning] = useState(false);
  const handle = e => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    setScanning(true);
    const r = new FileReader();
    r.onload = async ev => {
      try {
        const data = ev.target.result.split(",")[1];
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 500, messages: [{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: f.type, data } }, { type: "text", text: '名刺の画像から情報を読み取り、JSONのみ返してください。キー：{"name":"氏名","organization":"組織名","role":"役職・役割","phone":"電話番号","note":"その他情報"}' }] }] })
        });
        const d = await res.json();
        const txt = d.content && d.content.map(b => b.text || "").join("") || "";
        const parsed = JSON.parse(txt.replace(/```json|```/g, "").trim());
        onResult(parsed);
        toast.success("名刺を読み取りました");
      } catch { toast.error("名刺の読み取りに失敗しました"); }
      finally { setScanning(false); }
    };
    r.readAsDataURL(f);
  };
  return (
    <div>
      <button onClick={() => ref.current && ref.current.click()} disabled={scanning}
        className="flex flex-col items-center justify-center gap-1.5 px-6 py-4 bg-purple-100 border border-purple-300 rounded-xl text-purple-700 font-bold active:scale-95 disabled:opacity-50 min-h-[72px]">
        <span className="text-2xl leading-none">🪪</span>
        <span className="text-sm">{scanning ? "読み取り中…" : "名刺スキャン"}</span>
      </button>
      <input ref={ref} type="file" accept="image/*" capture="environment" className="hidden" onChange={handle} />
    </div>
  );
}

// ===== FACESHEET MODAL =====
function FSModal({ onClose, onExtracted, toast }) {
  const [files, setFiles] = useState([]); const [text, setText] = useState(""); const [loading, setLoading] = useState(false);
  const fileRef = useRef(); const camRef = useRef();
  const addFiles = e => Array.from(e.target.files || []).forEach(f => { const r = new FileReader(); r.onload = ev => setFiles(p => [...p, { name: f.name, mimeType: f.type, data: ev.target.result.split(",")[1], preview: ev.target.result }]); r.readAsDataURL(f); });
  const extract = async () => {
    if (!files.length && !text.trim()) { toast.error("写真またはテキストを入力してください"); return; }
    setLoading(true);
    try {
      const content = [];
      files.filter(f => f.mimeType && f.mimeType.startsWith("image/")).forEach(f => content.push({ type: "image", source: { type: "base64", media_type: f.mimeType, data: f.data } }));

【チェックボックス・選択欄の読み取りルール（最重要）】
- ✓、✔、レ点、○、●、■が付いている項目＝その内容が「該当・選択・実施あり」
- □（空のチェックボックス）、空欄＝非該当・なし
- チェックされた複数の項目は全て読み取り、自然な文章にまとめる
- 例：「□介護保険 ✓自立支援 □医療保険」→「自立支援医療を利用している」
- 例：「✓定期（週2回）□不定期」→「定期訪問（週2回）」
- 例：「✓有□無（薬の有無）」→「内服薬あり」

    finally { setLoading(false); }
  };
  return (
    <div className="fixed inset-0 z-50 flex flex-col bg-white">
      <div className="flex items-center justify-between px-4 py-3 border-b border-slate-200 bg-white flex-shrink-0">
        <div><h2 className="text-base font-bold text-slate-800">📄 フェイスシート読み取り</h2><p className="text-xs text-slate-500 mt-0.5">写真・PDF → 契約チェック＋記録書Ⅰに自動反映</p></div>
        <button onClick={onClose} className="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-200 text-slate-700 active:scale-95 text-lg font-bold">✕</button>
      </div>
      <div className="flex-1 overflow-y-auto px-4 py-4 space-y-4">
        <div className="bg-teal-50 border border-teal-300 rounded-2xl p-3">
          <p className="text-xs text-teal-700 font-bold mb-2">✦ 読み取り後に自動反映される主な項目</p>
          <div className="grid grid-cols-2 gap-1.5 text-xs">
            {[["契約","利用者名のみ"],["緊急","家族・支援者・主治医"],["記録Ⅰ","全項目（氏名・病歴・ADL等）"],["記録Ⅰ","家族構成・要望・申し送り"]].map(([t,i],n)=>(
              <div key={n} className="flex items-center gap-1.5"><span className={`px-1.5 py-0.5 rounded-full text-[10px] font-bold ${t==="契約"?"bg-amber-900/50 text-amber-700":t==="緊急"?"bg-pink-900/50 text-pink-700":"bg-blue-100 text-blue-800"}`}>{t}</span><span className="text-slate-500">{i}</span></div>
            ))}
          </div>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <button onClick={() => camRef.current && camRef.current.click()} className="flex flex-col items-center gap-3 py-10 rounded-2xl bg-amber-50 border-2 border-amber-400 text-amber-800 active:scale-[0.97]"><span className="text-5xl">📷</span><span className="text-base font-bold">カメラで撮影</span></button>
          <button onClick={() => fileRef.current && fileRef.current.click()} className="flex flex-col items-center gap-3 py-10 rounded-2xl bg-teal-50 border-2 border-teal-400 text-teal-800 active:scale-[0.97]"><span className="text-5xl">📁</span><span className="text-base font-bold">ファイル選択</span></button>
        </div>
        <input ref={camRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={addFiles} />
        <input ref={fileRef} type="file" accept="image/*,application/pdf" multiple className="hidden" onChange={addFiles} />
        {files.length > 0 && (
          <div className="flex flex-wrap gap-2">{files.map((f,i)=>(
            <div key={i} className="relative">
              {f.mimeType && f.mimeType.startsWith("image/") ? <img src={f.preview} className="w-20 h-20 rounded-xl object-cover border-2 border-teal-600/50" /> : <div className="w-20 h-20 rounded-xl bg-slate-200 border-2 border-slate-300 flex items-center justify-center text-2xl">📄</div>}
              <button onClick={() => setFiles(p => p.filter((_,j)=>j!==i))} className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 rounded-full text-white text-xs flex items-center justify-center font-bold">✕</button>
            </div>
          ))}</div>
        )}
        <TTextarea label="補足テキスト（任意）" value={text} onChange={setText} placeholder="フェイスシートの内容をテキストで貼り付けることも可能です" rows={4} voice />
      </div>
      <div className="px-4 py-4 border-t border-slate-200 bg-white flex-shrink-0">
        <button onClick={extract} disabled={loading || (!files.length && !text.trim())}
          className="w-full h-20 rounded-2xl bg-gradient-to-r from-teal-600 to-emerald-500 disabled:from-slate-300 disabled:to-slate-300 disabled:text-slate-600 text-white font-bold text-lg flex items-center justify-center gap-3 shadow-lg active:scale-[0.99]">
          {loading ? <><span className="animate-spin text-2xl">⏳</span><span>AI読み取り中…</span></> : <><span className="text-2xl">✨</span><span>AIで読み取り → 両方に反映</span></>}
        </button>
      </div>
    </div>
  );
}
